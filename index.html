<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Circuit Quest: Athlete RPG v4.1</title>
<style>
  :root{
    --bg0:#08111f; --bg1:#111b32; --bg2:#1a2950;
    --glass:rgba(255,255,255,.12); --glass2:rgba(255,255,255,.18); --stroke:rgba(255,255,255,.20);
    --text:#f7f9ff; --muted:rgba(247,249,255,.72); --soft:rgba(247,249,255,.52);
    --blue:#69a7ff; --green:#71f0a4; --gold:#ffd86b; --silver:#d8e4ff; --bronze:#d99a61; --red:#ff7b86;
    --shadow:0 20px 55px rgba(0,0,0,.28); --radius:28px; --radius2:18px;
    --safeTop:env(safe-area-inset-top); --safeBottom:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:radial-gradient(circle at 20% 0%, #2a5ea8 0%, transparent 30%), radial-gradient(circle at 85% 12%, #7547c8 0%, transparent 25%), linear-gradient(145deg,var(--bg0),var(--bg1) 45%,var(--bg2)); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Segoe UI,Roboto,Helvetica,Arial,sans-serif; -webkit-font-smoothing:antialiased;}
  body{min-height:100%; overflow-x:hidden;}
  body:before{content:""; position:fixed; inset:0; pointer-events:none; background:linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px); background-size:28px 28px; mask-image:linear-gradient(to bottom, rgba(0,0,0,.50), transparent 80%);}
  button,input,select,textarea{font:inherit} button{color:inherit}
  .app{width:min(1100px,100%); margin:0 auto; min-height:100vh; padding:calc(10px + var(--safeTop)) 12px calc(92px + var(--safeBottom));}
  .topbar{position:sticky;top:0;z-index:20; margin:0 -4px 10px; padding:8px; backdrop-filter:blur(28px) saturate(1.3); -webkit-backdrop-filter:blur(28px) saturate(1.3); background:rgba(10,18,34,.58); border:1px solid var(--stroke); border-radius:24px; box-shadow:var(--shadow)}
  .toprow{display:flex;gap:10px;align-items:center;justify-content:space-between}.brand{min-width:0}.brand h1{font-size:21px;line-height:1.05;margin:0;font-weight:820;letter-spacing:-.03em}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.statusPills{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:wrap}.pill{border:1px solid var(--stroke); background:rgba(255,255,255,.10); border-radius:999px; padding:7px 10px; font-size:12px; color:var(--muted); white-space:nowrap}.pill strong{color:var(--text)}
  .screen{display:none}.screen.active{display:block}.hero{padding:18px;border:1px solid var(--stroke);border-radius:var(--radius);background:linear-gradient(145deg,rgba(255,255,255,.17),rgba(255,255,255,.08));box-shadow:var(--shadow);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);margin-bottom:12px}.hero h2{font-size:30px;margin:0 0 4px;letter-spacing:-.04em}.hero p{margin:0;color:var(--muted);line-height:1.4}.grid{display:grid;gap:12px}.grid2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .card{border:1px solid var(--stroke);border-radius:var(--radius);background:linear-gradient(145deg,rgba(255,255,255,.15),rgba(255,255,255,.07));box-shadow:var(--shadow);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);padding:14px;min-width:0}.card.tight{padding:11px;border-radius:22px}.card h3,.card h4{margin:0 0 6px;letter-spacing:-.025em}.card p{margin:0;color:var(--muted);line-height:1.42}.small{font-size:12px;color:var(--muted)}.tiny{font-size:11px;color:var(--soft)}.row{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.stack{display:flex;flex-direction:column;gap:10px}.chips{display:flex;gap:6px;flex-wrap:wrap}.chip{border:1px solid var(--stroke);background:rgba(255,255,255,.10);border-radius:999px;padding:6px 9px;font-size:12px;color:var(--muted)}
  .sportCard,.questCard,.dailyCard,.leagueCard{cursor:pointer;transition:.18s transform,.18s background}.sportCard:hover,.questCard:hover,.dailyCard:hover,.leagueCard:hover{transform:translateY(-2px);background:rgba(255,255,255,.16)}.sportCard.active{outline:2px solid rgba(105,167,255,.75);background:rgba(105,167,255,.16)}.sportEmoji{font-size:30px;line-height:1}.sportName{font-weight:800;font-size:18px;letter-spacing:-.03em}.sectionTitle{font-size:20px;font-weight:850;letter-spacing:-.035em;margin:16px 2px 8px}.subtabs{display:flex;gap:8px;overflow-x:auto;padding:0 0 8px;margin:0 -2px}.subtabs button{border:1px solid var(--stroke);background:rgba(255,255,255,.09);border-radius:999px;padding:9px 13px;white-space:nowrap}.subtabs button.active{background:rgba(105,167,255,.24);border-color:rgba(105,167,255,.55)}
  .btn{border:0;border-radius:18px;background:rgba(255,255,255,.14);border:1px solid var(--stroke);padding:11px 13px;font-weight:760;cursor:pointer;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}.btn.primary{background:linear-gradient(135deg,#3184ff,#8b5cf6);border-color:rgba(255,255,255,.28)}.btn.green{background:linear-gradient(135deg,#30c875,#50d6c2)}.btn.gold{background:linear-gradient(135deg,#f5bd32,#ff8e3c)}.btn.danger{background:rgba(255,80,100,.18);border-color:rgba(255,130,140,.32)}.btn.ghost{background:rgba(255,255,255,.07)}.full{width:100%}
  .medals{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px}.medal{border:1px solid var(--stroke);border-radius:18px;padding:9px;background:rgba(255,255,255,.08);min-width:0}.medal b{display:block;font-size:12px}.medal span{font-size:12px;color:var(--muted)}.medal.bronze b{color:var(--bronze)}.medal.silver b{color:var(--silver)}.medal.gold b{color:var(--gold)}
  .bottomNav{position:fixed;left:50%;bottom:calc(8px + var(--safeBottom));transform:translateX(-50%);z-index:50;width:min(760px,calc(100% - 18px));display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:7px;border:1px solid var(--stroke);border-radius:28px;background:rgba(9,16,30,.72);backdrop-filter:blur(26px) saturate(1.3);-webkit-backdrop-filter:blur(26px) saturate(1.3);box-shadow:0 14px 50px rgba(0,0,0,.34)}.navBtn{border:0;border-radius:20px;min-height:48px;background:transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;font-size:10px;font-weight:700}.navBtn .ico{font-size:19px}.navBtn.active{background:rgba(255,255,255,.13);color:var(--text)}
  .questTitle{font-size:25px;font-weight:860;letter-spacing:-.04em;line-height:1.05}.questMeta{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.detailGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.detailBox{border:1px solid var(--stroke);border-radius:22px;padding:12px;background:rgba(255,255,255,.08)}.detailBox b{display:block;margin-bottom:4px}.stickyActions{position:sticky;bottom:calc(76px + var(--safeBottom));z-index:15;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;margin:12px -4px 0;border-radius:24px;background:rgba(10,18,34,.70);border:1px solid var(--stroke);backdrop-filter:blur(20px)}
  label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:0 0 5px} input,select,textarea{width:100%;border:1px solid var(--stroke);background:rgba(255,255,255,.11);color:var(--text);border-radius:16px;padding:12px;outline:none} input::placeholder,textarea::placeholder{color:rgba(255,255,255,.38)} textarea{min-height:84px;resize:vertical}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.resultHero{text-align:center;padding:20px}.resultHero .big{font-size:46px}.resultHero h2{font-size:30px;margin:4px 0;letter-spacing:-.04em}.progressBar{height:10px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.progressBar span{display:block;height:100%;background:linear-gradient(90deg,#69a7ff,#71f0a4);border-radius:999px}.leagueRow{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center}.leagueBadge{border-radius:20px;text-align:center;padding:10px;border:1px solid var(--stroke);background:rgba(255,255,255,.10);font-weight:850}.locked{opacity:.55}.logItem{display:grid;grid-template-columns:50px 1fr;gap:10px;align-items:start}.logMedal{font-size:24px;text-align:center}.empty{padding:22px;text-align:center;color:var(--muted)}
  @media(max-width:760px){.app{padding-left:9px;padding-right:9px;padding-bottom:calc(84px + var(--safeBottom))}.topbar{border-radius:20px;padding:7px;margin-bottom:8px}.brand h1{font-size:16px}.brand p{display:none}.statusPills{gap:4px}.pill{font-size:11px;padding:6px 7px}.hero{padding:14px;border-radius:24px}.hero h2{font-size:24px}.grid2,.grid3,.grid4{grid-template-columns:1fr}.detailGrid{grid-template-columns:1fr}.formGrid{grid-template-columns:1fr}.medals{grid-template-columns:1fr}.bottomNav{grid-template-columns:repeat(6,1fr);border-radius:24px;padding:5px}.navBtn{min-height:42px;font-size:9px}.navBtn .ico{font-size:18px}.card{border-radius:24px;padding:12px}.stickyActions{bottom:calc(70px + var(--safeBottom));grid-template-columns:1fr}.questTitle{font-size:22px}.sportCard .row{align-items:flex-start}.sportEmoji{font-size:26px}.leagueRow{grid-template-columns:1fr}.hidePhone{display:none!important}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="toprow">
      <div class="brand"><h1>Circuit Quest</h1><p>v4.1 · Adaptive baselines, daily challenges, league path</p></div>
      <div class="statusPills" id="statusPills"></div>
    </div>
  </header>

  <section class="screen active" id="dashboardScreen"></section>
  <section class="screen" id="sportsScreen"></section>
  <section class="screen" id="baselineScreen"></section>
  <section class="screen" id="dailyScreen"></section>
  <section class="screen" id="leagueScreen"></section>
  <section class="screen" id="profileScreen"></section>
</div>

<nav class="bottomNav" aria-label="Main navigation">
  <button class="navBtn active" data-screen="dashboard"><span class="ico">⌂</span><span>Home</span></button>
  <button class="navBtn" data-screen="sports"><span class="ico">◌</span><span>Sports</span></button>
  <button class="navBtn" data-screen="baseline"><span class="ico">◎</span><span>Base</span></button>
  <button class="navBtn" data-screen="daily"><span class="ico">✦</span><span>Daily</span></button>
  <button class="navBtn" data-screen="league"><span class="ico">◇</span><span>League</span></button>
  <button class="navBtn" data-screen="profile"><span class="ico">☰</span><span>Profile</span></button>
</nav>

<script>
(function(){
'use strict';
const APP_VERSION='4.1';
const SAVE_KEY='circuitQuest_v41';
const $=id=>document.getElementById(id);
const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
const round=(v,d=0)=>{const p=Math.pow(10,d);return Math.round(v*p)/p};
const todayKey=()=>new Date().toISOString().slice(0,10);
const fmtPct=v=>`${Math.round(v*100)}%`;
const fmtTime=s=>{s=Number(s)||0; const m=Math.floor(s/60), sec=Math.round(s%60); return `${m}:${String(sec).padStart(2,'0')}`;};
const feet=(v)=>`${round(v,1)} ft`;
const uid=()=>Math.random().toString(36).slice(2,9);

const SPORTS=[
  {id:'basketball',name:'Basketball',emoji:'🏀',color:'#ff9b45'},
  {id:'running',name:'Running',emoji:'🏃',color:'#71f0a4'},
  {id:'swimming',name:'Swimming',emoji:'🏊',color:'#5fd7ff'},
  {id:'track',name:'Track & Field',emoji:'🥇',color:'#ffd86b'},
  {id:'strength',name:'Strength',emoji:'💪',color:'#c096ff'},
  {id:'recovery',name:'Recovery',emoji:'🌙',color:'#9ad8ff'},
  {id:'volleyball',name:'Volleyball',emoji:'🏐',color:'#fff18b'},
  {id:'soccer',name:'Soccer',emoji:'⚽',color:'#9cffb7'},
  {id:'baseball',name:'Baseball / Softball',emoji:'🥎',color:'#ffcc9c'},
  {id:'football',name:'Football',emoji:'🏈',color:'#e0a26a'}
];
const sportById=id=>SPORTS.find(s=>s.id===id)||SPORTS[0];

function quest(o){return Object.assign({category:'baseline', minutes:'5–10 min', bronze:'Complete the test', record:'Enter the honest result.', fatigue:6, coins:24, rep:3, fields:[]},o)}

const QUESTS=[
 // Basketball
 quest({id:'bb-ft10',sport:'basketball',name:'10 Free Throws',type:'pct',attempts:10,minutes:'4–6 min',do:'Shoot 10 free throws using the same routine every shot. This is not a race.',setup:'Stand at the free throw line. Use one ball. Reset your feet and breathing before each shot.',counts:'Only regulation free throws count. If the routine breaks, restart the routine but keep the attempt.',baseSilver:.40,baseGold:.50,record:'Makes out of 10. Note misses short/long/left/right.',fields:['made','attempts','notes']}),
 quest({id:'bb-3pt-corner',sport:'basketball',name:'20 Corner Threes',type:'pct',attempts:20,minutes:'6–9 min',do:'Shoot 20 threes from one assigned corner. Use the same corner for the full test.',setup:'Start in the corner behind the 3-point line. If there is no line, use the longest safe game-distance shot available.',counts:'Only shots from the assigned corner count. Do not step closer.',baseSilver:.15,baseGold:.20,related:'bb-ft10',record:'Makes out of 20. Record which corner you used.',fields:['made','attempts','notes']}),
 quest({id:'bb-mid20',sport:'basketball',name:'20 Midrange Spot Shots',type:'pct',attempts:20,minutes:'6–8 min',do:'Shoot 20 shots from the right wing midrange spot.',setup:'Stand free-throw-line extended, one large step inside the 3-point arc, about 12–15 feet at a 45° angle.',counts:'Only shots from the marked spot count. Reset to the mark before every shot.',baseSilver:.30,baseGold:.40,record:'Makes out of 20.',fields:['made','attempts','notes']}),
 quest({id:'bb-layups20',sport:'basketball',name:'Layup Package',type:'pct',attempts:20,minutes:'5–7 min',do:'Complete 10 right-hand layups and 10 left-hand layups.',setup:'Start outside the lane. Use clean footwork, no rushing.',counts:'A make counts only if the correct hand is used and the athlete finishes under control.',baseSilver:.55,baseGold:.70,record:'Makes out of 20 and which side missed more.',fields:['made','attempts','notes']}),
 quest({id:'bb-handle60',sport:'basketball',name:'60-Second Handle Circuit',type:'count',unit:'clean touches',minutes:'60 sec',do:'Perform 20 seconds right-hand pounds, 20 seconds left-hand pounds, 20 seconds crossovers.',setup:'Stay in one athletic stance. Keep eyes forward as much as possible.',counts:'Clean touches only. A bobble or pickup does not count as a clean touch.',baseSilver:40,baseGold:55,record:'Clean touches in 60 seconds.',fields:['count','notes']}),
 quest({id:'bb-slide',sport:'basketball',name:'Closeout + Slide Test',type:'count',unit:'clean patterns',minutes:'5 min',do:'Complete closeout, slide right, slide left, recover to start.',setup:'Set a start cone and a target cone 10–12 feet away. Closeout with high hands, then slide both directions.',counts:'A clean pattern requires controlled closeout, no crossed feet on slides, and return to start.',baseSilver:6,baseGold:10,record:'Clean patterns completed.',fields:['count','notes']}),
 // Running
 quest({id:'run-mile',sport:'running',name:'Baseline Mile',type:'time',unit:'mile',minutes:'10–20 min',do:'Complete one mile at a steady pace. The goal is to learn pace and record an honest time.',setup:'Use a track, measured route, or treadmill. Walk breaks are allowed for early baselines.',counts:'The full mile must be completed. Record total time including walk breaks.',baseSilver:960,baseGold:870,record:'Mile time.',fields:['time','notes'],fatigue:10}),
 quest({id:'run-400',sport:'running',name:'400m Control Run',type:'time',unit:'400m',minutes:'4–7 min',do:'Run one controlled 400m. Do not sprint the first 100m.',setup:'Use one track lap or a measured 400m route.',counts:'Record total time. Stay controlled through the finish.',baseSilver:140,baseGold:120,record:'400m time.',fields:['time','notes'],fatigue:8}),
 quest({id:'run-6min',sport:'running',name:'6-Minute Distance',type:'distance',unit:'miles',minutes:'6 min',do:'Cover as much distance as possible in 6 minutes at a sustainable effort.',setup:'Use a track, treadmill, or GPS route.',counts:'Record distance covered in 6 minutes.',baseSilver:.45,baseGold:.55,record:'Distance in miles.',fields:['distance','notes'],fatigue:8}),
 quest({id:'run-shuttle',sport:'running',name:'5-10-5 Shuttle',type:'time',unit:'shuttle',minutes:'5 min',do:'Run one 5-10-5 shuttle with clean direction changes.',setup:'Mark center, 5 yards left, and 5 yards right.',counts:'Touch each line. Record time for best clean attempt.',baseSilver:8.5,baseGold:7.6,record:'Best shuttle time.',fields:['time','notes'],fatigue:7}),
 quest({id:'run-strides',sport:'running',name:'Stride Count Challenge',type:'count',unit:'clean strides',minutes:'5 min',do:'Run relaxed 20-second strides and count smooth, tall strides.',setup:'Use a flat open area. Walk back between rounds.',counts:'Count clean strides only when posture stays tall and relaxed.',baseSilver:80,baseGold:105,record:'Total clean strides across rounds.',fields:['count','notes'],fatigue:6}),
 quest({id:'run-walk',sport:'running',name:'10-Minute Run/Walk',type:'distance',unit:'miles',minutes:'10 min',do:'Move continuously for 10 minutes using any run/walk mix.',setup:'Use a safe route. Keep effort conversational.',counts:'Record total distance. Do not stop the timer during walks.',baseSilver:.55,baseGold:.70,record:'Distance in miles.',fields:['distance','notes'],fatigue:7}),
 // Swimming
 quest({id:'swim-25',sport:'swimming',name:'25y Freestyle Sprint',type:'time',unit:'25y',minutes:'3–5 min',do:'Swim one 25-yard freestyle sprint with clean effort.',setup:'Push from wall or start in the water. Use safe pool rules.',counts:'Record the fastest clean 25y time.',baseSilver:35,baseGold:28,record:'25y time.',fields:['time','notes'],fatigue:7}),
 quest({id:'swim-50',sport:'swimming',name:'50y Freestyle Baseline',type:'time',unit:'50y',minutes:'5–8 min',do:'Swim 50 yards freestyle at strong but controlled effort.',setup:'Two lengths in a 25y pool. Rest before the attempt.',counts:'Record total time including the turn.',baseSilver:75,baseGold:60,record:'50y time.',fields:['time','notes'],fatigue:8}),
 quest({id:'swim-100easy',sport:'swimming',name:'100y Easy Control',type:'time',unit:'100y',minutes:'5–10 min',do:'Swim 100 yards without stopping if possible.',setup:'Use any legal freestyle pace. Focus on relaxed breathing.',counts:'Record total time. Rest only if needed, but include rest in time.',baseSilver:180,baseGold:150,record:'100y time.',fields:['time','notes'],fatigue:8}),
 quest({id:'swim-5lap',sport:'swimming',name:'5-Minute Lap Count',type:'count',unit:'lengths',minutes:'5 min',do:'Swim for 5 minutes and count completed pool lengths.',setup:'Use a safe lane. Choose sustainable pace.',counts:'Only completed lengths count.',baseSilver:4,baseGold:6,record:'Lengths completed.',fields:['count','notes'],fatigue:7}),
 quest({id:'swim-kick',sport:'swimming',name:'Kickboard Control',type:'time',unit:'25y kick',minutes:'5 min',do:'Kick one 25y length with a board or streamline position.',setup:'Use steady flutter kick. Keep body long.',counts:'Record best clean 25y kick time.',baseSilver:50,baseGold:38,record:'25y kick time.',fields:['time','notes'],fatigue:6}),
 quest({id:'swim-streamline',sport:'swimming',name:'Streamline Push Distance',type:'distance',unit:'yards',minutes:'5 min',do:'Push off in streamline and glide/kick as far as possible before first breath or form break.',setup:'Use safe depth and lane. No breath holding beyond comfort.',counts:'Record farthest clean distance.',baseSilver:5,baseGold:8,record:'Distance in yards.',fields:['distance','notes'],fatigue:4}),
 // Track & Field
 quest({id:'tf-shot',sport:'track',name:'Shot Put Baseline',type:'distance',unit:'feet',minutes:'8–10 min',do:'Complete 6 standing shot put throws.',setup:'Use safe throwing area. Start from power position or standing throw only.',counts:'Only legal controlled throws count. Record best throw.',baseSilver:18,baseGold:21,record:'Best distance in feet.',fields:['distance','notes'],fatigue:8}),
 quest({id:'tf-discus',sport:'track',name:'Discus Baseline',type:'distance',unit:'feet',minutes:'8–10 min',do:'Complete 6 controlled discus throws.',setup:'Use safe sector. Start from standing or South African if trained.',counts:'Only safe controlled throws count. Record best throw.',baseSilver:45,baseGold:55,record:'Best distance in feet.',fields:['distance','notes'],fatigue:8}),
 quest({id:'tf-100',sport:'track',name:'100m Sprint Baseline',type:'time',unit:'100m',minutes:'5–8 min',do:'Run one 100m sprint after a safe warmup.',setup:'Use a track or measured straight. Start from standing unless trained otherwise.',counts:'Record best clean time.',baseSilver:18.5,baseGold:16.5,record:'100m time.',fields:['time','notes'],fatigue:8}),
 quest({id:'tf-400',sport:'track',name:'400m Pace Baseline',type:'time',unit:'400m',minutes:'5–8 min',do:'Run one 400m at controlled hard effort.',setup:'Use a track lap. Do not sprint the first 100m.',counts:'Record total time.',baseSilver:145,baseGold:125,record:'400m time.',fields:['time','notes'],fatigue:9}),
 quest({id:'tf-broad',sport:'track',name:'Standing Broad Jump',type:'distance',unit:'feet',minutes:'5 min',do:'Complete 5 standing broad jumps.',setup:'Start with toes behind line. Land safely with both feet.',counts:'Measure best controlled landing.',baseSilver:4.5,baseGold:5.5,record:'Best jump in feet.',fields:['distance','notes'],fatigue:5}),
 quest({id:'tf-starts',sport:'track',name:'Sprint Start Reactions',type:'count',unit:'clean starts',minutes:'6 min',do:'Complete 8 sprint starts over 10 yards.',setup:'Start from athletic stance. Focus on first three steps.',counts:'Clean start means forward drive, no false step, full finish.',baseSilver:5,baseGold:7,record:'Clean starts out of 8.',fields:['count','notes'],fatigue:6}),
 // Strength
 quest({id:'str-air-squat',sport:'strength',name:'2-Minute Air Squat Test',type:'count',unit:'clean reps',minutes:'2 min',do:'Complete as many clean air squats as possible in 2 minutes.',setup:'Feet stable, full control, no knee collapse. Stop if form breaks.',counts:'A rep counts when depth/control are clean and posture is safe.',baseSilver:35,baseGold:55,record:'Clean reps in 2 minutes.',fields:['count','notes'],fatigue:7}),
 quest({id:'str-pushup',sport:'strength',name:'2-Minute Push-Up Test',type:'count',unit:'clean reps',minutes:'2 min',do:'Complete clean push-ups in 2 minutes.',setup:'Use standard push-up or elevated surface if needed. Keep body line.',counts:'Only controlled reps count. Stop when form breaks.',baseSilver:8,baseGold:15,record:'Clean reps.',fields:['count','notes'],fatigue:7}),
 quest({id:'str-plank',sport:'strength',name:'Plank Hold',type:'hold',unit:'seconds',minutes:'1–4 min',do:'Hold a front plank with clean body position.',setup:'Elbows under shoulders. Stop when hips sag or pain appears.',counts:'Record clean hold seconds only.',baseSilver:30,baseGold:60,record:'Hold time in seconds.',fields:['time','notes'],fatigue:5}),
 quest({id:'str-goblet',sport:'strength',name:'Goblet Squat 3x10',type:'load',unit:'lb',minutes:'8–10 min',do:'Complete 3 sets of 10 goblet squats with clean form.',setup:'Use a dumbbell/kettlebell. Rest 60–90 seconds between sets.',counts:'Load counts only if all 30 reps are controlled and safe.',baseSilver:25,baseGold:35,related:'str-air-squat',record:'Weight used and completed reps.',fields:['load','count','notes'],fatigue:9}),
 quest({id:'str-carry',sport:'strength',name:'Farmer Carry',type:'load',unit:'lb total',minutes:'6–8 min',do:'Carry weight for 4 controlled 20-yard walks.',setup:'Use dumbbells or safe objects. Tall posture. No leaning.',counts:'Record total load carried cleanly for all walks.',baseSilver:40,baseGold:70,record:'Total load in pounds.',fields:['load','notes'],fatigue:7}),

function load(){try{const raw=localStorage.getItem(SAVE_KEY); if(raw){return Object.assign(defaultState(),JSON.parse(raw));}}catch(e){} return defaultState();}
function save(){state.version=APP_VERSION; localStorage.setItem(SAVE_KEY,JSON.stringify(state)); render();}
function logsFor(qid){return state.log.filter(l=>l.questId===qid && l.kind==='baseline');}
function sportLogs(sport){return state.log.filter(l=>l.sport===sport);}
function medalIcon(m){return m==='Gold'?'🥇':m==='Silver'?'🥈':m==='Bronze'?'🥉':'•'}
function medalClass(m){return (m||'').toLowerCase();}
function performanceValue(q, entry){
  if(!entry) return null;
  if(q.type==='pct') return entry.attempts>0 ? entry.made/entry.attempts : null;
  if(q.type==='time') return entry.time || null;
  if(q.type==='distance') return entry.distance || null;
  if(q.type==='count') return entry.count || null;
  if(q.type==='hold') return entry.time || null;
  if(q.type==='load') return entry.load || null;
  if(q.type==='complete') return entry.rating || 1;
  return null;
}
function weightedHistory(q){
  const arr=logsFor(q.id).map(l=>l.value).filter(v=>v!==null&&v!==undefined&&isFinite(v));
  if(!arr.length) return null;
  const last3=arr.slice(-3), last10=arr.slice(-10);
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  return avg(last3)*0.6 + avg(last10)*0.3 + arr[arr.length-1]*0.1;
}
function ftToThreePrediction(){
  const ft=questById('bb-ft10'); const h=weightedHistory(ft);
  if(h==null) return null;
  // Conservative cross-skill estimate: 80% FT starts around 20–25% 3PT, not 35%.
  return clamp(h*0.46 - 0.15, .05, .32);
}
function strengthLoadPrediction(){
  const air=questById('str-air-squat'); const reps=weightedHistory(air); const bw=Number(state.athlete.weight)||150; const age=Number(state.athlete.age)||14;
  if(reps==null) return null;
  let pct = reps>=100 ? .23 : reps>=75 ? .20 : reps>=50 ? .16 : .12;
  if(age<15) pct=Math.min(pct,.25);
  return Math.max(15, Math.round((bw*pct)/5)*5);
}
function adaptiveTargets(q){
  let silver=q.baseSilver, gold=q.baseGold, source='starter baseline';
  const hist=weightedHistory(q);
  if(hist!=null){
    source='recent average';
    if(q.type==='pct'){
      silver=clamp(hist,.05,.92); gold=clamp(hist+.10,.10,.97);
    }else if(q.type==='time'){
      silver=hist*1.02; gold=hist*.94;
    }else if(q.type==='distance' || q.type==='count' || q.type==='hold' || q.type==='load'){
      silver=hist; gold=hist*1.10;
    }
  } else if(q.id==='bb-3pt-corner'){
    const pred=ftToThreePrediction();
    if(pred!=null){silver=clamp(pred,.05,.35); gold=clamp(pred+.05,.08,.45); source='free throw touch estimate, discounted until 3PT history exists';}
  } else if(q.id==='str-goblet'){
    const pred=strengthLoadPrediction();
    if(pred!=null){silver=pred; gold=pred+10; source='air squat endurance + body-weight safety estimate';}
  }
  // Round to usable targets.
  if(q.type==='pct'){
    const a=q.attempts||10; let s=Math.max(1,Math.round(silver*a)); let g=Math.max(s+1,Math.round(gold*a)); g=Math.min(g,a); return {source, silver, gold, silverText:`${s}/${a}`, goldText:`${g}/${a}`, silverMakes:s, goldMakes:g};
  }
  if(q.type==='time') return {source, silver, gold, silverText:`${fmtTime(silver)} or faster`, goldText:`${fmtTime(gold)} or faster`};
  if(q.type==='distance') return {source, silver, gold, silverText:`${feet(silver)}+`, goldText:`${feet(gold)}+`};
  if(q.type==='count') return {source, silver, gold, silverText:`${Math.round(silver)}+ ${q.unit||'reps'}`, goldText:`${Math.round(gold)}+ ${q.unit||'reps'}`};
  if(q.type==='hold') return {source, silver, gold, silverText:`${Math.round(silver)}+ sec`, goldText:`${Math.round(gold)}+ sec`};
  if(q.type==='load') return {source, silver, gold, silverText:`${Math.round(silver)} lb`, goldText:`${Math.round(gold)} lb`};
  return {source, silver, gold, silverText:'Good check-in', goldText:'Excellent check-in'};
}
function medalFor(q, entry){
  const t=adaptiveTargets(q);
  if(q.type==='pct'){
    const made=Number(entry.made)||0, attempts=Number(entry.attempts)||q.attempts||0;
    if(attempts < (q.attempts||1)) return 'Bronze';
    if(made>=t.goldMakes) return 'Gold'; if(made>=t.silverMakes) return 'Silver'; return 'Bronze';
  }
  const v=performanceValue(q,entry);
  if(q.type==='time') { if(v && v<=t.gold) return 'Gold'; if(v && v<=t.silver) return 'Silver'; return 'Bronze'; }
  if(q.type==='distance'||q.type==='count'||q.type==='hold'||q.type==='load') { if(v>=t.gold) return 'Gold'; if(v>=t.silver) return 'Silver'; return 'Bronze'; }
  if(q.type==='complete') { if((Number(entry.rating)||0)>=8) return 'Gold'; if((Number(entry.rating)||0)>=5) return 'Silver'; return 'Bronze'; }
  return 'Bronze';
}
function resultSummary(q, entry){
  if(q.type==='pct') return `${entry.made||0}/${entry.attempts||q.attempts}`;
  if(q.type==='time') return fmtTime(entry.time||0);
  if(q.type==='distance') return q.unit==='inches'?`${round(entry.distance||0,1)} in`:feet(entry.distance||0);
  if(q.type==='count') return `${entry.count||0} ${q.unit||''}`;
  if(q.type==='hold') return `${Math.round(entry.time||0)} sec`;
  if(q.type==='load') return `${Math.round(entry.load||0)} lb`;
  return `rating ${entry.rating||''}`;
}
function rewardFor(q, medal){
  const mult=medal==='Gold'?1.7:medal==='Silver'?1.25:1;
  return {coins:Math.round((q.coins||24)*mult), rep:Math.round((q.rep||3)*mult), trophy:medal==='Gold'?1:0};
}
function submitBaseline(){
  const q=questById(state.activeQuest); if(!q) return;
  const entry=readEntry(q); const medal=medalFor(q,entry); const rew=rewardFor(q,medal); const value=performanceValue(q,entry);
  state.coins+=rew.coins; state.rep[q.sport]=(state.rep[q.sport]||0)+rew.rep; if(rew.trophy) state.trophies[q.sport]=(state.trophies[q.sport]||0)+1;
  state.log.push({id:uid(),date:new Date().toISOString(),kind:'baseline',sport:q.sport,questId:q.id,name:q.name,medal,value,summary:resultSummary(q,entry),entry,reward:rew});
  state.mode='reward'; save();
}
function readEntry(q){
  const num=id=>Number($(id)?.value||0);
  return {made:num('madeInput'),attempts:num('attemptsInput')||q.attempts||0,time:timeToSeconds($('timeInput')?.value),distance:num('distanceInput'),count:num('countInput'),load:num('loadInput'),rating:num('ratingInput'),notes:$('notesInput')?.value||''};
}
function timeToSeconds(v){ if(!v) return 0; const s=String(v).trim(); if(s.includes(':')){const [m,sec]=s.split(':').map(Number); return (m||0)*60+(sec||0);} return Number(s)||0; }
function inputHTML(q){
  let h='';
  if(q.fields.includes('made')) h+=`<div><label>Makes</label><input id="madeInput" inputmode="numeric" type="number" min="0" placeholder="0"></div>`;
  if(q.fields.includes('attempts')) h+=`<div><label>Attempts</label><input id="attemptsInput" inputmode="numeric" type="number" min="0" value="${q.attempts||''}"></div>`;
  if(q.fields.includes('time')) h+=`<div><label>Time</label><input id="timeInput" inputmode="decimal" placeholder="mm:ss or seconds"></div>`;
  if(q.fields.includes('distance')) h+=`<div><label>Distance</label><input id="distanceInput" inputmode="decimal" type="number" step="0.1" placeholder="${q.unit||'distance'}"></div>`;
  if(q.fields.includes('count')) h+=`<div><label>Count / Reps</label><input id="countInput" inputmode="numeric" type="number" min="0" placeholder="0"></div>`;
  if(q.fields.includes('load')) h+=`<div><label>Load / Weight</label><input id="loadInput" inputmode="decimal" type="number" step="5" placeholder="lb"></div>`;
  if(q.fields.includes('rating')) h+=`<div><label>Rating 1–10</label><input id="ratingInput" inputmode="numeric" type="number" min="1" max="10" placeholder="1-10"></div>`;
  h+=`<div style="grid-column:1/-1"><label>Notes</label><textarea id="notesInput" placeholder="Optional: form notes, soreness, miss pattern, conditions"></textarea></div>`;
  return h;
}
function setScreen(screen){state.activeScreen=screen; state.mode='view'; state.activeQuest=null; save();}
function openQuest(id){state.activeQuest=id; state.mode='detail'; state.activeScreen='baseline'; save(); window.scrollTo({top:0,behavior:'smooth'});}
function startEntry(){state.mode='entry'; save(); window.scrollTo({top:0,behavior:'smooth'});}
function closeQuest(){state.activeQuest=null; state.mode='view'; save();}
function selectedQuests(){return QUESTS.filter(q=>q.sport===state.selectedSport);}
function renderStatus(){const s=sportById(state.selectedSport); $('statusPills').innerHTML=`<span class="pill"><strong>${state.athlete.name}</strong></span><span class="pill">${s.emoji} ${s.name}</span><span class="pill">◈ <strong>${state.coins}</strong></span><span class="pill">Rep <strong>${state.rep[state.selectedSport]||0}</strong></span>`;}
function render(){
  renderStatus();
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); $(state.activeScreen+'Screen').classList.add('active');
  document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('active',b.dataset.screen===state.activeScreen));
  renderDashboard(); renderSports(); renderBaseline(); renderDaily(); renderLeague(); renderProfile();
}
function renderDashboard(){
  const s=sportById(state.selectedSport); const logs=sportLogs(state.selectedSport); const golds=logs.filter(l=>l.medal==='Gold').length; const last=logs.slice(-1)[0];
  $('dashboardScreen').innerHTML=`
    <div class="hero"><h2>${s.emoji} ${s.name} Path</h2><p>v4.1 removes fantasy stat math. The app measures real baselines, uses moving averages, gives quick daily challenges, and compares progress to a league ladder.</p></div>
    <div class="grid grid3">
      <div class="card"><h3>Baseline Tests</h3><p>${selectedQuests().length} fixed measuring sticks. Goals adapt from your actual results.</p><button class="btn primary full" data-go="baseline">Open baselines</button></div>
      <div class="card"><h3>Daily Challenge</h3><p>One quick 5–10 minute challenge for fun, coins, and streaks.</p><button class="btn green full" data-go="daily">Today’s challenge</button></div>
      <div class="card"><h3>League Path</h3><p>Approximate real-world goal ladder from Middle School through Pro.</p><button class="btn gold full" data-go="league">View ladder</button></div>
    </div>
    <div class="sectionTitle">Current Snapshot</div>
    <div class="grid grid4">
      <div class="card tight"><span class="tiny">Sport Rep</span><h3>${state.rep[state.selectedSport]||0}</h3></div>
      <div class="card tight"><span class="tiny">Golds</span><h3>${golds}</h3></div>
      <div class="card tight"><span class="tiny">Total Logs</span><h3>${logs.length}</h3></div>
      <div class="card tight"><span class="tiny">Coins</span><h3>${state.coins}</h3></div>
    </div>
    <div class="sectionTitle">Last Result</div>
    ${last?logHTML(last):'<div class="card empty">No results yet. Start with a baseline quest.</div>'}`;
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>setScreen(b.dataset.go));
}
function renderSports(){
  $('sportsScreen').innerHTML=`<div class="hero"><h2>Choose Sport</h2><p>All 10 sports have real baseline quests. Pick a sport, then run baselines or daily challenges.</p></div><div class="grid grid2">${SPORTS.map(s=>`<div class="card sportCard ${state.selectedSport===s.id?'active':''}" data-sport="${s.id}"><div class="row"><div><div class="sportEmoji">${s.emoji}</div><div class="sportName">${s.name}</div><p class="small">${QUESTS.filter(q=>q.sport===s.id).length} baselines · ${state.rep[s.id]||0} rep · ${state.trophies[s.id]||0} golds</p></div><button class="btn">Select</button></div></div>`).join('')}</div>`;
  document.querySelectorAll('[data-sport]').forEach(c=>c.onclick=()=>{state.selectedSport=c.dataset.sport; save();});
}
function questCard(q){const t=adaptiveTargets(q); return `<div class="card questCard" data-q="${q.id}"><div class="row"><div><h3>${q.name}</h3><p>${q.do}</p></div><button class="btn primary">Start</button></div><div class="questMeta"><span class="chip">${q.minutes}</span><span class="chip">${q.type}</span><span class="chip">${t.source}</span></div><div class="medals"><div class="medal bronze"><b>Bronze</b><span>${q.bronze}</span></div><div class="medal silver"><b>Silver</b><span>${t.silverText}</span></div><div class="medal gold"><b>Gold</b><span>${t.goldText}</span></div></div></div>`}
function renderBaseline(){
  if(state.mode==='detail'||state.mode==='entry'||state.mode==='reward'){renderQuestScreen();return;}
  const s=sportById(state.selectedSport); $('baselineScreen').innerHTML=`<div class="hero"><h2>${s.emoji} Baseline Quests</h2><p>These tests stay fixed. The goals adapt from your moving average so the game starts easy and gradually finds a fair challenge.</p></div><div class="grid grid2">${selectedQuests().map(questCard).join('')}</div>`;
  document.querySelectorAll('[data-q]').forEach(c=>c.onclick=()=>openQuest(c.dataset.q));
}
function renderQuestScreen(){
  const q=questById(state.activeQuest); if(!q){state.mode='view'; renderBaseline(); return;}
  const t=adaptiveTargets(q);
  if(state.mode==='detail'){
    $('baselineScreen').innerHTML=`<div class="card"><div class="row"><div><div class="questTitle">${q.name}</div><p>${sportById(q.sport).emoji} ${sportById(q.sport).name} baseline</p></div><button class="btn ghost" onclick="window.CQ.closeQuest()">Exit</button></div><div class="questMeta"><span class="chip">${q.minutes}</span><span class="chip">Fatigue ${q.fatigue>0?'+':''}${q.fatigue}</span><span class="chip">${t.source}</span></div><div class="detailGrid"><div class="detailBox"><b>Do</b><span>${q.do}</span></div><div class="detailBox"><b>Setup / Where</b><span>${q.setup}</span></div><div class="detailBox"><b>What Counts</b><span>${q.counts}</span></div><div class="detailBox"><b>Record</b><span>${q.record}</span></div></div><div class="medals"><div class="medal bronze"><b>Bronze</b><span>${q.bronze}</span></div><div class="medal silver"><b>Silver</b><span>${t.silverText}</span></div><div class="medal gold"><b>Gold</b><span>${t.goldText}</span></div></div><div class="stickyActions"><button class="btn ghost" onclick="window.CQ.closeQuest()">Back</button><button class="btn primary" onclick="window.CQ.startEntry()">Enter Result</button></div></div>`;
  } else if(state.mode==='entry'){
    $('baselineScreen').innerHTML=`<div class="card"><div class="row"><div><div class="questTitle">Enter Result</div><p>${q.name}</p></div><button class="btn ghost" onclick="window.CQ.closeQuest()">Exit</button></div><div class="formGrid" style="margin-top:12px">${inputHTML(q)}</div><div class="stickyActions"><button class="btn ghost" onclick="window.CQ.openQuest('${q.id}')">Back</button><button class="btn green" onclick="window.CQ.submitBaseline()">Submit</button></div></div>`;
  } else if(state.mode==='reward'){
    const last=state.log[state.log.length-1]; $('baselineScreen').innerHTML=`<div class="card resultHero"><div class="big">${medalIcon(last.medal)}</div><h2>${last.medal}</h2><p>${last.name} · ${last.summary}</p><div class="grid grid3" style="margin-top:14px"><div class="card tight"><span class="tiny">Coins</span><h3>+${last.reward.coins}</h3></div><div class="card tight"><span class="tiny">Rep</span><h3>+${last.reward.rep}</h3></div><div class="card tight"><span class="tiny">Gold Trophy</span><h3>${last.reward.trophy?'+1':'—'}</h3></div></div><div class="stickyActions"><button class="btn primary" onclick="window.CQ.closeQuest()">Back to Baselines</button><button class="btn gold" onclick="window.CQ.setScreen('league')">Check League</button></div></div>`;
  }
}
function dailyForSport(sport){const list=DAILY[sport]||DAILY.basketball; const idx=(new Date().getDate()+sport.length)%list.length; return list[idx];}
function renderDaily(){const s=sportById(state.selectedSport); const d=dailyForSport(state.selectedSport); const done=state.daily[todayKey()+':'+state.selectedSport]; $('dailyScreen').innerHTML=`<div class="hero"><h2>${s.emoji} Daily Challenge</h2><p>A quick 5–10 minute challenge. It is not the measuring stick; it is the fun habit builder.</p></div><div class="card dailyCard"><div class="row"><div><h3>${d[0]}</h3><p>${d[1]}</p></div><span class="chip">5–10 min</span></div><div class="medals"><div class="medal bronze"><b>Bronze</b><span>Complete honestly</span></div><div class="medal silver"><b>Silver</b><span>Good focus</span></div><div class="medal gold"><b>Gold</b><span>Beat your last feel/result</span></div></div><button class="btn ${done?'ghost':'primary'} full" style="margin-top:12px" onclick="window.CQ.completeDaily()">${done?'Completed today':'Mark Complete +25 coins'}</button></div>`;}
function completeDaily(){const key=todayKey()+':'+state.selectedSport; if(state.daily[key])return; state.daily[key]=true; state.coins+=25; state.rep[state.selectedSport]=(state.rep[state.selectedSport]||0)+2; state.log.push({id:uid(),date:new Date().toISOString(),kind:'daily',sport:state.selectedSport,name:dailyForSport(state.selectedSport)[0],medal:'Bronze',summary:'Daily complete',reward:{coins:25,rep:2,trophy:0}}); save();}
function bestMetric(metric){const [label,qid,type]=metric; const q=questById(qid); const vals=logsFor(qid).map(l=>l.value).filter(v=>v!=null); if(!vals.length)return null; if(type==='time') return Math.min(...vals); return Math.max(...vals);}
function meets(type,value,target){if(value==null)return false; return type==='time'?value<=target:value>=target;}
function renderLeague(){
 const s=sportById(state.selectedSport); const metrics=LEAGUE_STANDARDS[state.selectedSport]||[]; let current=-1; for(let i=0;i<LEAGUES.length;i++){ if(metrics.every(m=>meets(m[2],bestMetric(m),m[3][i]))) current=i; }
 const next=clamp(current+1,0,LEAGUES.length-1); const goal=state.leagueGoal[state.selectedSport] ?? next; const rows=LEAGUES.map((name,i)=>{const met=i<=current; const active=i===next; const isGoal=i===goal; return `<div class="card leagueCard ${met?'':'locked'}"><div class="leagueRow"><div class="leagueBadge">${met?'✓':active?'Next':isGoal?'Goal':'Locked'}<br>${name}</div><div class="stack">${metrics.map(m=>`<div><b>${m[0]}</b> <span class="small">Goal: ${formatStandard(m[2],m[3][i])} · Your best: ${formatBest(m)}</span></div>`).join('')}<button class="btn ${isGoal?'gold':'ghost'}" onclick="window.CQ.setLeagueGoal(${i})">${isGoal?'Current Goal':'Set as Goal'}</button></div></div></div>`}).join('');
 $('leagueScreen').innerHTML=`<div class="hero"><h2>${s.emoji} League Path</h2><p>Approximate real-world-style goal bands. These are training targets, not recruiting guarantees. Current: <b>${current>=0?LEAGUES[current]:'Unranked'}</b>. Joined goal league: <b>${LEAGUES[goal]}</b>. Next suggested: <b>${LEAGUES[next]}</b>.</p></div><div class="stack">${rows}</div>`;
}
function formatStandard(type,v){if(type==='pct')return fmtPct(v); if(type==='time')return fmtTime(v); if(type==='distance')return feet(v); if(type==='hold')return `${Math.round(v)} sec`; return String(v);}
function formatBest(m){const v=bestMetric(m); if(v==null)return 'No result'; return formatStandard(m[2],v);}
function renderProfile(){
 const a=state.athlete; $('profileScreen').innerHTML=`<div class="hero"><h2>Profile & Save</h2><p>Age, body weight, and history help keep adaptive targets safe and realistic.</p></div><div class="card"><div class="formGrid"><div><label>Name</label><input id="profName" value="${escapeHtml(a.name)}"></div><div><label>Age</label><input id="profAge" type="number" value="${a.age}"></div><div><label>Weight lb</label><input id="profWeight" type="number" value="${a.weight}"></div><div><label>Grade / Level</label><input id="profGrade" value="${escapeHtml(a.grade)}"></div></div><div class="grid grid2" style="margin-top:12px"><button class="btn primary" onclick="window.CQ.saveProfile()">Save Profile</button><button class="btn ghost" onclick="window.CQ.exportSave()">Export Save</button><button class="btn ghost" onclick="window.CQ.importSave()">Import Save</button><button class="btn danger" onclick="window.CQ.resetApp()">Reset App</button></div></div><div class="sectionTitle">Recent Log</div><div class="stack">${state.log.slice(-12).reverse().map(logHTML).join('')||'<div class="card empty">No log entries yet.</div>'}</div>`;
}
function logHTML(l){return `<div class="card tight logItem"><div class="logMedal">${medalIcon(l.medal)}</div><div><b>${l.name}</b><p>${new Date(l.date).toLocaleDateString()} · ${l.summary||''}</p><span class="tiny">${sportById(l.sport).name} · ${l.kind}</span></div></div>`}
function saveProfile(){state.athlete={name:$('profName').value||'Athlete',age:Number($('profAge').value)||14,weight:Number($('profWeight').value)||150,grade:$('profGrade').value||'Middle School'}; save();}
function exportSave(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='circuit-quest-v4.1-save.json'; a.click(); URL.revokeObjectURL(a.href);}
function importSave(){const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=()=>{const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{state=Object.assign(defaultState(),JSON.parse(r.result)); save();}catch(e){alert('Could not import save.')}}; r.readAsText(f)}; inp.click();}
function setLeagueGoal(i){state.leagueGoal[state.selectedSport]=i; save();}
function resetApp(){if(confirm('Reset all local app data?')){localStorage.removeItem(SAVE_KEY); state=defaultState(); save();}}
function escapeHtml(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
window.CQ={setScreen,openQuest,startEntry,closeQuest,submitBaseline,completeDaily,saveProfile,exportSave,importSave,setLeagueGoal,resetApp};
document.querySelectorAll('.navBtn').forEach(b=>b.addEventListener('click',()=>setScreen(b.dataset.screen)));
render();
})();
</script>
</body>
</html>
