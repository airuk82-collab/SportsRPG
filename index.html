function cooldownItems(area,source){const a=String(area||'general');let picks;if(/bench|push|press|chest|shoulder|arms/.test(a)){picks=[['Doorway Pec Stretch','1-2 easy holds, 30-45 sec','Stretch chest and front shoulder after pressing. Do not force range.'],['Lat / Upper-Back Stretch or Foam Roll','1-2 easy passes/holds','Downshift the lats and upper back after upper-body work.']]}else if(/squat|legs|quad/.test(a)){picks=[['Quad / Hip Flexor Stretch','1-2 easy holds, 30-45 sec','Stretch the front of the hip and thigh after lower-body work.'],['Calf Stretch or Light Foam Roll','1-2 easy holds/passes','Use if calves or ankles were stressed. Easy pressure only.']]}else if(/hinge|glute|hamstring|deadlift/.test(a)){picks=[['Hamstring Stretch or Floss','1-2 easy holds/sets','Open the hamstrings after hinge work. No aggressive pulling.'],['Glute Stretch or Foam Roll','1-2 easy holds/passes','Relax glutes and posterior chain after work sets.']]}else if(/pull|back|row/.test(a)){picks=[['Lat Stretch','1-2 easy holds, 30-45 sec','Long easy reach. Breathe into the side body.'],['Upper-Back Foam Roll or Open Book','1-2 easy passes/sets','Decompress upper back after pulling.']]}else if(/power|jump|sprint|throw|loaded/.test(a)){picks=[['Calf / Achilles Stretch','1-2 easy holds, 30-45 sec','Stretch calves after jumps, sprints, or loaded power.'],['Hip Flexor Stretch','1-2 easy holds, 30-45 sec','Downshift hips after explosive work.']]}else{picks=[['Worked-Muscle Stretch','1-2 easy holds','Stretch the muscles trained today.'],['Breathing Downshift','1-2 minutes easy breathing','Long exhales to bring the body out of training mode.']]}return picks.slice(0,2).map(x=>supportExercise(x[0],x[1],'cooldown',x[2],{tags:['cooldown',source||''],phase:'cooldown'}))}
function resetItems(area,source){return cooldownItems(area,source)}
function performanceExercise(name,reps,rest,sets,intent,cue,opts={}){let arr=[];for(let i=0;i<sets;i++)arr.push({set:i+1,targetReps:reps,quality:'fast',complete:false});return{type:'performance',name,sets:arr,rest,intent,cue,setupCost:opts.setupCost||'low',equipment:opts.equipment||inferEquipment(name),tags:opts.tags||[],phase:opts.phase||'main'}}
function swimBlock(name,lengths,rest,rounds,intent,cue){return{type:'swim',name,lengths,rest,rounds,intent,cue,setupCost:'pool',equipment:'Pool',phase:intent==='warmup'?'warmup':intent==='reset'?'cooldown':'main'}}
function inferEquipment(n){if(/Trap Bar/i.test(n))return'Trap Bar';if(/Barbell|Squat|Bench Press|Deadlift|Quarter|Speed Squat|Push Press/i.test(n))return'Barbell + rack';if(/Dumbbell/i.test(n))return'Dumbbells';if(/Band/i.test(n))return'Bands';if(/Pull|Hang/i.test(n))return'Pullup Bar';if(/Medicine|Med Ball/i.test(n))return'Medicine Ball';if(/Jump Rope/i.test(n))return'Jump Rope';if(/Cone|Shuttle|Sprint|Acceleration/i.test(n))return'Cones / open space';if(/Pool|Swim/i.test(n))return'Pool';return'Open floor'}
function exerciseByPillar(pillar){const band=ageBand(),lvl=state.profile.level;const choices={squat:canBarbell()?['Barbell Squat','squat']:(hasEq('Dumbbells')||hasEq('Kettlebell'))?['Goblet Squat','squat']:['Bodyweight Squat','squat'],hinge:hasEq('Trap Bar')&&lvl!=='beginner'?['Trap Bar Deadlift','hinge']:canBarbell()?['Barbell RDL','hinge']:hasEq('Dumbbells')?['Dumbbell RDL','hinge']:['Glute Bridge','hinge'],bench:canBench()?['Bench Press','bench']:hasEq('Dumbbells')&&hasEq('Bench/Box')?['Dumbbell Bench Press','bench']:['Pushup','bench'],press:canBarbell()?['Barbell Shoulder Press','press']:hasEq('Dumbbells')?['Dumbbell Shoulder Press','press']:['Pike Pushup','press'],pull:hasEq('Pullup Bar')&&band!=='youth'?['Pull-Up / Assisted Pull-Up','pull']:hasEq('Cable/Machines')?['Cable Row','row']:hasEq('Dumbbells')?['Dumbbell Row','row']:hasEq('Bands')?['Band Row','row']:['Prone W Raise','row']};return choices[pillar]||choices.bench}

function generateEnduranceSupportLift(){let title='Endurance Strength Support',subtitle='Compound whole-body durability so endurance athletes keep stability, posture, and basic strength without turning the week into a strength program.';let items=[];items.push(...warmupItems('endurance_support','endurance'));const lower=hasEq('Dumbbells')||hasEq('Kettlebell')?'Goblet Squat or Step-Up':'Bodyweight Split Squat';const hinge=hasEq('Dumbbells')?'Single-Leg Dumbbell RDL':'Single-Leg Hip Hinge';const pull=exerciseByPillar('pull');const push=canBench()?['Push-Up or Light Bench Press','bench']:hasEq('Dumbbells')?['Dumbbell Floor Press','bench']:['Push-Up','bench'];items.push(liftExercise(lower,'squat',2,6,10,'endurance_support',75,{cue:'Whole-body support. Smooth reps, 3-4 reps in reserve. Do not create soreness for the next endurance day.',setupCost:'medium'}));items.push(liftExercise(hinge,'hinge',2,6,10,'endurance_support',75,{cue:'Posterior-chain durability. Balance and control matter more than load.',setupCost:'medium'}));items.push(liftExercise(pull[0],pull[1],2,8,12,'endurance_support',60,{cue:'Upper-back posture support for endurance mechanics.',setupCost:'medium'}));items.push(liftExercise(push[0],push[1],2,8,12,'endurance_support',60,{cue:'Basic push strength. Keep it easy and clean.',setupCost:'medium'}));items.push(liftExercise(hasEq('Dumbbells')?'Farmer Carry':'Side Plank','core',2,20,40,'endurance_support',60,{load:hasEq('Dumbbells')?undefined:0,cue:'Bracing, posture, and stability. Log seconds or steps as reps.',setupCost:'low'}));items.push(...cooldownItems('endurance_support','endurance'));return{title,subtitle,items}}
function addLift(items,pillar,sets,minRep,maxRep,mode,rest,opts={}){const ex=opts.nameKey?[opts.nameKey[0],opts.nameKey[1]]:exerciseByPillar(pillar);items.push(liftExercise(ex[0],ex[1],sets,minRep,maxRep,mode,rest,Object.assign({setupCost:/Barbell|Bench|Trap/i.test(ex[0])?'high':'medium'},opts)))}

function generateLiftWorkout(role){if(role==='strength_core'||role==='strength_support')return generateEnduranceSupportLift();if(role==='upper_core_balance'){let items=[],title='Upper + Core Balance',subtitle='Protected day: upper-body and core only.';items.push(...warmupItems('bench','protected'));items.push(liftExercise(exerciseByPillar('bench')[0],exerciseByPillar('bench')[1],3,6,8,'strength',120,{cue:'Lower body protected today. Upper strength only.',setupCost:'medium'}));items.push(liftExercise(exerciseByPillar('pull')[0],exerciseByPillar('pull')[1],3,6,10,'strength',100,{cue:'Pulling and posture support.',setupCost:'medium'}));items.push(liftExercise('Dead Bug Brace','core',2,20,40,'hybrid',60,{load:0,cue:'Ribs down, breathe, control pelvis.',setupCost:'low'}));items.push(...cooldownItems('bench','protected'));return{title,subtitle,items}}

function generateHybridPower(role){let items=[],title='Power Coach',subtitle='Power uses one unified quality format: checklist warm-up, performance or loaded sets, full rest, then cooldown. No conditioning fatigue chasing.';items.push(...warmupItems('power','power'));

 }

function generateTimed(role){let title='Timed Coach',subtitle='Timer-first coaching for low-setup work.',items=[];if(role==='scheduled_rest'){title='Scheduled Rest Day';subtitle='Calendar says today is not a planned workout day. You can rest, mark soreness, or train anyway from the readiness/calendar controls.';items=[timedExercise('Easy Walk or Breathing',35,10,2,'movement','Optional easy movement only. This is not counted as a hard workout.'),timedExercise('Gentle Mobility Check',30,10,2,'movement','Move through sore areas gently. Stop if pain shows up.')]}else if(role==='movement_recovery'||role==='bonus_recovery'){title='Movement + Recovery';items=[timedExercise('Breathing Downshift',45,5,2,'movement','Long exhale, shoulders relaxed.'),timedExercise('Hip Mobility Flow',40,5,3,'movement','Open hips without forcing range.'),timedExercise('Dead Bug Breathing',35,5,3,'core','Ribs down, slow limbs.')]}else if(role.includes('movement')){title=role.includes('core')?'Movement + Core':role.includes('balance')?'Movement + Balance':'Movement Exercises';items=[timedExercise('Breathing Downshift',40,5,2,'movement','Slow inhale, long exhale.'),timedExercise('90/90 Hip Switch',35,5,3,'mobility','Control range.'),timedExercise('Single-Leg Balance Reach',30,10,3,'balance','Foot and hip control.'),timedExercise('Side Plank',25,15,3,'core','Stack ribs and hips.')]}else if(role.includes('power')){title=/sprint/.test(role)?'Power — Sprint / Acceleration':/jump/.test(role)?'Power — Jump / Reactive':/prep/.test(role)?'Power — Prep / Recovery':'Bodyweight Timed Power';subtitle='Unified Timed Power: short explosive work, longer rest, no lifting log in this session.';if(/prep/.test(role)){items=[timedExercise('Dynamic Athletic Prep',30,15,3,'warmup','Easy skips, marches, and athletic stance. Warm tissues before speed.',{phase:'warmup',tags:['warmup']}),timedExercise('Landing Mechanics Practice',20,40,4,'landing','Quiet landings and clean positions. No max effort.',{phase:'main'}),timedExercise('Core Stiffness Drill',25,35,3,'core','Brace and transfer force without fatigue.',{phase:'main'}),timedExercise('Hip / Calf Downshift',35,5,2,'cooldown','Easy post-power mobility.',{phase:'cooldown',tags:['cooldown']})]}
 else if(/sprint/.test(role)){items=[timedExercise('Dynamic Sprint Prep',30,15,2,'warmup','Marches, skips, and falling-start rehearsal.',{phase:'warmup',tags:['warmup']}),timedExercise('5-Yard Acceleration Burst',6,75,6,'sprint_power','Hard first step. Full rest; not conditioning.'),timedExercise('Deceleration Stick',8,60,5,'decel','Stop under control, knee over foot.'),timedExercise('Hip Flexor / Calf Downshift',35,5,2,'cooldown','Easy stretch after acceleration.',{phase:'cooldown',tags:['cooldown']})]}
 else {items=[timedExercise('Dynamic Jump Prep',30,15,2,'warmup','Easy pogo, skips, and landing rehearsal.',{phase:'warmup',tags:['warmup']}),timedExercise('Pogo Hops',8,60,5,'plyo_power','Quick contacts. Stop before rhythm slows.'),timedExercise('Broad Jump Stick',10,75,4,'plyo_power','Explode and stick the landing.'),timedExercise('Jump-and-Stick',10,75,4,'landing','Quiet landing, freeze position.'),timedExercise('Calf / Hip Downshift',35,5,2,'cooldown','Easy stretch and breathing after jumps.',{phase:'cooldown',tags:['cooldown']})]}}
else if(role.includes('conditioning')){if(role==='conditioning_low_impact'||role==='conditioning_easy'){title='Low-Impact Conditioning';subtitle='Timed conditioning without jump/sprint impact. Keeps the goal when joints, calves, or energy are not ready for pounding.';items=[timedExercise('Easy Movement Ramp',35,10,2,'warmup','Raise temperature gradually before intervals.',{phase:'warmup',tags:['warmup']}),timedExercise('March / Step Jack / Bike Substitute',35,25,6,'conditioning_low_impact','Repeatable effort without hard impact.'),timedExercise('Incline Pushup or Band Press',30,20,4,'conditioning','Clean reps under breathing fatigue.'),timedExercise('Band Row or Dead Bug',30,20,4,'core_conditioning','Posture and core without pounding.'),timedExercise('Breathing Downshift',40,5,2,'cooldown','Long exhales after conditioning.',{phase:'cooldown',tags:['cooldown']})]}else{title='Conditioning Circuit';subtitle='Timed conditioning with a short ramp-up and downshift.';items=[timedExercise('Easy Movement Ramp',35,10,2,'warmup','Raise temperature gradually before intervals.',{phase:'warmup',tags:['warmup']}),timedExercise('Jump Rope or Fast Feet',25,35,6,'conditioning','Repeatable pace. Do not sprint into sloppy reps.'),timedExercise('Pushup / Incline Pushup',30,20,4,'conditioning','Clean reps under breathing fatigue.'),timedExercise('Shuttle Run or March',25,35,5,'conditioning','Controlled repeat effort.'),timedExercise('Plank',30,20,3,'core','Brace and breathe.'),timedExercise('Breathing Downshift',40,5,2,'cooldown','Long exhales after conditioning.',{phase:'cooldown',tags:['cooldown']})]}}else{title='Endurance / Work Capacity';subtitle='Endurance work with an easy ramp, main aerobic/tempo work, and cooldown downshift.';items=[timedExercise('Easy Pace Warmup',45,15,3,'warmup','Raise temperature gradually.',{phase:'warmup',tags:['warmup']}),timedExercise('Tempo Intervals',60,30,6,'endurance','Moderate-hard, repeatable pace.'),timedExercise('Breathing Downshift',40,5,2,'cooldown','Long exhales after endurance work.',{phase:'cooldown',tags:['cooldown']})]}return{title,subtitle,items}}
function convertLengthToYards(){const p=state.env.pool,len=+p.length||25;if(p.unit==='m')return len*1.09361;if(p.unit==='ft')return len/3;return len}
function lengthsForDistance(yards){return Math.max(1,Math.round(yards/Math.max(1,convertLengthToYards())))}
function swimDistanceText(lengths,rounds=1){const yards=lengths*rounds*convertLengthToYards(),unit=state.env.pool.unit;return`${lengths} length${lengths===1?'':'s'} x ${rounds} = about ${Math.round(yards)} yd total (${state.env.pool.length} ${unit} pool)`}
function generateSwim(role){const ability=state.env.pool.ability,style=state.env.pool.style;let title='Swim Coach',subtitle='Swim mode converts pool length into lengths and total distance. Safety first: no breath-hold contests.';let base=ability==='beginner'?200:ability==='comfortable'?500:800;if(role.includes('conditioning'))base*=.75;let warm=lengthsForDistance(base*.2),main=lengthsForDistance(base*.15),cool=lengthsForDistance(base*.15),items=[];if(style==='time'||ability==='beginner'){title='Swim — Time Based';items=[timedExercise('Easy Swim / Rest as Needed',60,20,ability==='beginner'?6:10,'swim','Smooth breathing. Stop before panic or form breakdown.',{equipment:'Pool',setupCost:'pool'}),timedExercise('Standing Lat Stretch on Wall',35,5,2,'reset_mobility','Long reach, easy breathing after the swim.'),timedExercise('Half-Kneeling Hip Flexor Stretch',35,5,2,'reset_mobility','Open the front of the hip without forcing range.')]}else{title=role.includes('conditioning')?'Swim Conditioning':'Swim Endurance';items=[swimBlock('Warm-up Easy Swim',warm,30,1,'warmup','Easy, smooth stroke.'),swimBlock(role.includes('conditioning')?'Hard Length + Easy/Rest':'Moderate Swim Interval',main,45,ability==='advanced'?8:6,'swim','Controlled effort. Stroke must stay clean.'),swimBlock('Easy Swim Finish',cool,0,1,'reset','Easy breathing finish.')]}return{title,subtitle,items}}
function itemSeconds(it){if(it.type==='lift')return it.sets.length*((it.rest||90)+35);if(it.type==='performance')return it.sets.length*((it.rest||60)+20);if(it.type==='support')return it.intent==='cooldown'?90:120;if(it.type==='swim')return it.rounds*((it.lengths*25)+it.rest);return it.rounds*(it.work+it.rest)}
function estimateTotal(w){let sec=0,setup=0;(w.items||[]).forEach(it=>{setup+={low:10,medium:45,high:120,pool:180}[it.setupCost]||20;sec+=itemSeconds(it)});return{training:sec,setup,combined:sec+setup}}
function buildSetup(w){const eq={},notes=[],weights=[];(w.items||[]).forEach(it=>{if(it.equipment)eq[it.equipment]=1;if(it.setupCost==='high')notes.push(`${it.name}: rack/bench/bar setup required. Timer waits for Ready.`);if(it.type==='lift')weights.push(`${it.name}: start around ${it.sets[0].suggestedLoad?it.sets[0].suggestedLoad+' lb':'bodyweight / technique load'}; target ${it.target}.`);if(it.type==='swim')notes.push(`${it.name}: ${swimDistanceText(it.lengths,it.rounds)}.`)});if(w.mode==='lift'||w.mode==='hybrid')notes.unshift('This workout uses one unified set/rep/checklist flow. Warm-up and cooldown are not timed interval blocks; main sets use setup-aware starts and rest timers only.');if(w.mode==='timed')notes.unshift('Low-setup timed blocks auto-advance. Pause if space or equipment is not ready.');if(w.mode==='swim')notes.unshift('Do not swim alone. Kids need adult supervision. No underwater breath-hold challenges.');if(w.governor&&w.governor.mode!=='normal')notes.unshift('Calendar/readiness adjustment: '+w.governor.reason);return{equipment:Object.keys(eq),notes,weights}}

oning_low_impact:'Low-Impact Conditioning',conditioning_swim:'Swim Conditioning',endurance_main:'Endurance Main',endurance_interval:'Endurance Intervals',endurance_easy:'Easy Endurance / Swim',endurance_steady:'Steady Endurance',endurance_tempo:'Tempo Endurance',endurance_recovery:'Recovery Endurance',endurance_swim:'Swim Endurance',movement:'Movement',movement_hips:'Movement — Hips',movement_shoulders:'Movement — Shoulders',movement_spine_core:'Movement — Spine/Core',movement_balance:'Movement + Balance',movement_mobility_posture:'Mobility / Posture',movement_balance_breathing:'Balance / Breathing',movement_core:'Movement + Core',movement_recovery:'Movement + Recovery',upper_core_balance:'Upper + Core Balance',balanced_full_body:'Balanced Full Body',bonus_recovery:'Bonus Recovery',scheduled_rest:'Scheduled Rest Day'};return map[r]||cap(r)}

function calendarControlsCard(){const days=normalizeScheduleDays();return`<div class="card"><h3>Calendar Training Days</h3><p class="small">Select the days the athlete can actually train. The app plans around these days and estimates recovery by real elapsed time. A 72-hour hard-training window is recommended after hard same-region work, but estimated recovery can be overridden by the user. Pain cannot be overridden.</p><div class="chips" style="margin-top:12px">${[0,1,2,3,4,5,6].map(d=>`<button class="chip ${days.includes(d)?'active':''}" onclick="Coach.toggleScheduleDay(${d})">${scheduledDayLabel(d)}</button>`).join('')}</div><div class="row" style="margin-top:12px"><button class="secondary" onclick="Coach.advanceCalendarDay(-1)">Back Calendar Day</button><button class="secondary" onclick="Coach.advanceCalendarDay(1)">Advance Calendar Day</button></div><div class="row" style="margin-top:10px"><button class="secondary" onclick="Coach.useRealToday()">Use Real Today</button><button class="secondary" onclick="Coach.skipToday()">Skip / Rest Today</button></div>${!isScheduledTrainingDay()?`<div style="height:10px"></div><button class="secondary" onclick="Coach.trainTodayAnyway()">Train Today Anyway</button>`:''}<p class="small" style="margin-top:10px">Today: ${esc(currentRealDateLabel())}${state.calendar.useSimDate?' (test date)':''}. Planned days: ${esc(scheduleLabel())}.</p></div>`}
function weekView(){let rows='',days=normalizeScheduleDays();for(let i=1;i<=days.length;i++){state._previewPlanDay=i;const planned=plannedRole(),gov=weeklySafetyGovernor(planned),role=gov.role,mode=workoutModeForRole(role);rows+=`<tr><td>${esc(scheduledDayLabel(days[i-1]))}</td><td>${esc(roleLabel(role))}${role!==planned?`<br><span class="small">planned ${esc(roleLabel(planned))}</span>`:''}</td><td>${esc(cap(mode))}</td></tr>`}delete state._previewPlanDay;return`<section class="screen">${header('Calendar','Calendar-based plan: selected days first, recovery over real elapsed time second.','Calendar')} ${calendarControlsCard()}<div class="card"><h3>Planned Training Days</h3><table class="table"><thead><tr><th>Day</th><th>Focus</th><th>Mode</th></tr></thead><tbody>${rows}</tbody></table></div><div class="row"><button class="secondary" onclick="Coach.prevDay()">Back Workout Slot</button><button class="secondary" onclick="Coach.nextDay()">Next Workout Slot</button></div>${stressLedgerCard()}<div class="card"><h3>Outside Load</h3>${outsideRows()}</div>${outsideForm()}${tabs()}</section>`}
function readinessView(){return`<section class="screen">${header('Readiness','Detailed body map, manual sore-area marks, low energy, outside load, calendar days, and override.','Ready')}${calendarControlsCard()}${readinessCard()}${daysBackCard()}${stressLedgerCard()}${readinessBadge()}<div class="card"><h3>Today Readiness</h3><div class="grid"><div class="field"><label>Energy</label><select onchange="Coach.setReadiness('energy',this.value)"><option ${state.readiness.energy==='Normal'?'selected':''}>Normal</option><option ${state.readiness.energy==='Low'?'selected':''}>Low</option><option ${state.readiness.energy==='High'?'selected':''}>High</option></select></div><div class="field"><label>General Soreness</label><select onchange="Coach.setReadiness('soreness',this.value)"><option ${state.readiness.soreness==='None'?'selected':''}>None</option><option ${state.readiness.soreness==='Mild'?'selected':''}>Mild</option><option ${state.readiness.soreness==='High'?'selected':''}>High</option></select></div></div><p class="small" style="margin-top:12px"><b>Mark sore areas</b> until calendar syncing can infer more context automatically.</p>${sorenessChips()}<div style="height:10px"></div><button class="secondary" onclick="Coach.clearSoreness()">Clear Sore Areas</button><label class="small" style="display:flex;gap:8px;margin-top:12px;align-items:center"><input type="checkbox" ${state.readiness.pain?'checked':''} onchange="Coach.setReadiness('pain',this.checked)" style="width:auto;height:auto"> Pain or unsafe movement today</label><div style="height:12px"></div><button class="secondary" onclick="Coach.toggleOverride()">${state.readiness.override?'Override On — Turn Off':'Override Recovery Window'}</button></div>${stressLedgerCard()}<div class="card"><h3>Outside Load</h3>${outsideRows()}</div>${outsideForm()}${tabs()}</section>`}
function profileView(){return`<section class="screen">${header('Profile','Goal, training level, equipment, pool, audio, and setup choices drive mode selection.','Profile')}<div class="card"><h3>Main Goal</h3><div class="grid">${GOALS.map(g=>`<button class="goal ${state.goal===g[0]?'active':''}" onclick="Coach.setGoal('${g[0]}')"><strong>${esc(g[1])}</strong><span>${esc(g[2])}</span></button>`).join('')}</div></div><div class="card"><h3>Athlete</h3><div class="grid"><div class="field"><label>Age</label><input type="number" value="${state.profile.age}" onchange="Coach.setProfile('age',this.value)"></div><div class="field"><label>Sex</label><select onchange="Coach.setProfile('sex',this.value)"><option ${state.profile.sex==='Female'?'selected':''}>Female</option><option ${state.profile.sex==='Male'?'selected':''}>Male</option></select></div><div class="field"><label>Height Ft</label><input type="number" value="${state.profile.heightFt}" onchange="Coach.setProfile('heightFt',this.value)"></div><div class="field"><label>Height In</label><input type="number" value="${state.profile.heightIn}" onchange="Coach.setProfile('heightIn',this.value)"></div><div class="field"><label>Weight</label><input type="number" value="${state.profile.weight}" onchange="Coach.setProfile('weight',this.value)"></div><div class="field"><label>Training Level</label><select onchange="Coach.setProfile('level',this.value)">${['beginner','novice','intermediate','advanced'].map(x=>`<option value="${x}" ${state.profile.level===x?'selected':''}>${cap(x)}</option>`).join('')}</select></div><div class="field"><label>Days/week</label><select onchange="Coach.setState('days',this.value)">${[1,2,3,4,5,6].map(n=>`<option ${state.days===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>Minutes</label><select onchange="Coach.setState('minutes',this.value)">${[15,20,25,30,35,40,45,50,60].map(n=>`<option ${state.minutes===n?'selected':''}>${n}</option>`).join('')}</select></div></div></div><div class="card"><h3>Equipment</h3><div class="field"><label>Space</label><select onchange="Coach.setEnv('space',this.value)">${SPACES.map(s=>`<option ${state.env.space===s?'selected':''}>${s}</option>`).join('')}</select></div><div style="height:12px"></div><div class="chips">${EQUIPMENT.map(e=>`<button class="chip ${hasEq(e)?'active':''}" onclick="Coach.toggleEq('${e}')">${esc(e)}</button>`).join('')}</div></div><div class="card"><h3>Pool</h3><label class="small" style="display:flex;gap:8px;align-items:center"><input type="checkbox" ${state.env.pool.available?'checked':''} onchange="Coach.setPool('available',this.checked)" style="width:auto;height:auto"> Pool available</label><div class="grid" style="margin-top:12px"><div class="field"><label>Length</label><input type="number" value="${state.env.pool.length}" onchange="Coach.setPool('length',this.value)"></div><div class="field"><label>Unit</label><select onchange="Coach.setPool('unit',this.value)"><option value="yd" ${state.env.pool.unit==='yd'?'selected':''}>yards</option><option value="m" ${state.env.pool.unit==='m'?'selected':''}>meters</option><option value="ft" ${state.env.pool.unit==='ft'?'selected':''}>feet</option></select></div><div class="field"><label>Ability</label><select onchange="Coach.setPool('ability',this.value)">${['beginner','comfortable','advanced'].map(x=>`<option value="${x}" ${state.env.pool.ability===x?'selected':''}>${cap(x)}</option>`).join('')}</select></div><div class="field"><label>Style</label><select onchange="Coach.setPool('style',this.value)">${['auto','time','lengths','land'].map(x=>`<option value="${x}" ${state.env.pool.style===x?'selected':''}>${cap(x)}</option>`).join('')}</select></div></div></div><div class="card"><h3>Audio Cues</h3><p class="small">Voice cues are used for setup, lift targets, timed countdowns, rest, and next blocks.</p><button class="secondary" onclick="Coach.toggleVoice()">Voice ${state.settings.voice?'On':'Off'}</button><div style="height:10px"></div><button class="secondary" onclick="Coach.testVoice()">Test Voice</button></div>${tabs()}</section>`}
function logView(){return`<section class="screen">${header('Log','Manual lifting log and recent set history.','Log')}<div class="card"><h3>Manual Lift Log</h3><div class="grid"><div class="field"><label>Exercise</label><input id="manualExercise" value="Bench Press"></div><div class="field"><label>Weight lb</label><input id="manualLoad" type="number" value="95"></div><div class="field"><label>Reps</label><input id="manualReps" type="number" value="10"></div><div class="field"><label>RIR</label><select id="manualRir"><option>3+</option><option>3</option><option>2</option><option>1</option><option>0</option></select></div></div><div style="height:12px"></div><button class="primary" onclick="Coach.manualLog()">Save Manual Set</button></div><div class="card"><h3>Known Exercise Starts</h3>${Object.keys(state.exerciseHistory).length?Object.keys(state.exerciseHistory).map(k=>`<div class="metric"><b>${esc(k)}</b><span>${esc((state.exerciseHistory[k].slice(-1)[0]||{}).summary||'')}</span></div>`).join(''):'<p class="small">No set history yet.</p>'}</div>${tabs()}</section>`}
function historyView(){return`<section class="screen">${header('History','Completed sessions, logs, and recovery inputs.','History')}<div class="card"><h3>Recent Sessions</h3>${state.history.length?state.history.slice(-12).reverse().map(h=>`<div class="metric"><b>${esc(h.title)}</b><span>${new Date(h.at).toLocaleDateString()} · ${esc(cap(h.mode||''))} · ${h.logs?h.logs.length:0} logs</span></div>`).join(''):'<p class="small">No completed sessions yet.</p>'}</div><button class="danger" onclick="Coach.clearHistory()">Clear History</button>${tabs()}</section>`}
function startSetup(){state.view='setup';save();render();speak('Review setup before starting. Get equipment and loads ready first.')}
function beginWorkout(){state.active={workout:clone(state.workout),idx:0,setIdx:0,phase:'setup',timer:null,remain:0,logs:[],running:false,timed:null};state.view='active';save();render();const it=currentItem();speak(`Workout started. First exercise: ${it?it.name:''}. Set up first, then start when ready.`)}
function currentItem(){return state.active&&state.active.workout.items[state.active.idx]}
function activeView(){const a=state.active,it=currentItem();if(!a||!it)return todayView();if(it.type==='lift')return liftActiveView(it);if(it.type==='performance')return performanceActiveView(it);if(it.type==='support')return supportActiveView(it);if(it.type==='swim')return swimActiveView(it);return timedActiveView(it)}
function activeTop(it){return`<div class="topline"><button class="back" onclick="Coach.exitWorkout()">Exit</button><span class="pill">${esc(cap(it.type))} · ${state.active.idx+1}/${state.active.workout.items.length}</span></div>`}
function supportActiveView(it){return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag ${it.intent==='cooldown'?'green':'blue'}">${it.intent==='cooldown'?'Cooldown':'Warm-Up'} Checklist</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${esc(it.target)}</b><span>target</span></div><div class="setBox"><b>${esc(it.equipment)}</b><span>setup</span></div><div class="setBox"><b>No timer</b><span>unified mode</span></div></div></div><button class="primary" onclick="Coach.skipItem()">Done</button><div style="height:10px"></div><button class="secondary" onclick="Coach.skipItem()">Skip</button></section>`}
function liftActiveView(it){const a=state.active,set=it.sets[a.setIdx]||it.sets[0];if(a.phase==='rest')return restView(it);if(a.phase==='log')return setLogView(it,set);if(a.phase==='set')return liftSetInProgressView(it,set);return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag purple">Lift Coach</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${set.set}/${it.sets.length}</b><span>set</span></div><div class="setBox"><b>${set.suggestedLoad?set.suggestedLoad+' lb':'BW'}</b><span>suggested</span></div><div class="setBox"><b>${esc(it.target)}</b><span>target</span></div></div>${it.tempo?`<p class="note" style="margin-top:12px">Tempo: ${esc(it.tempo)}</p>`:''}</div><div class="card"><h3>Setup-Aware Start</h3><ul class="setupList"><li>${esc(it.equipment)}</li><li>Load suggested weight if appropriate.</li><li>Set rack/bench/safety if needed.</li><li>Press Start Set only when ready.</li></ul></div><button class="primary" onclick="Coach.startLiftSet()">Start Set</button><div style="height:10px"></div><button class="secondary" onclick="Coach.skipItem()">Skip Exercise</button></section>`}
function liftSetInProgressView(it,set){return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag purple">Set In Progress</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${set.set}/${it.sets.length}</b><span>set</span></div><div class="setBox"><b>${set.suggestedLoad?set.suggestedLoad+' lb':'BW'}</b><span>load</span></div><div class="setBox"><b>${esc(it.target)}</b><span>target</span></div></div></div><button class="primary" onclick="Coach.finishLiftSet()">Set Complete — Log It</button></section>`}
function startLiftSet(){const it=currentItem(),set=it&&it.sets?it.sets[state.active.setIdx]:null;state.active.phase='set';save();render();speak(`${it.name}. Set ${set?set.set:''}. ${set&&set.suggestedLoad?set.suggestedLoad+' pounds.':''} Target ${it.target}. ${it.cue}`)}
function finishLiftSet(){state.active.phase='log';save();render();speak('Set complete. Enter weight, reps, effort, speed, and form.')}
function setLogView(it,set){return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag purple">Set Complete</span><h2>${esc(it.name)}</h2><p>Enter what actually happened. The next set adjusts from this.</p><div class="grid" style="margin-top:12px"><div class="field"><label>Weight lb</label><input id="actualLoad" type="number" value="${set.suggestedLoad||''}"></div><div class="field"><label>Reps</label><input id="actualReps" type="number" value="${set.targetMax||set.targetReps||''}"></div><div class="field"><label>RIR</label><select id="actualRir"><option>3+</option><option>3</option><option>2</option><option>1</option><option>0</option></select></div><div class="field"><label>Speed</label><select id="actualSpeed"><option>fast</option><option>ok</option><option>slow</option></select></div><div class="field"><label>Form</label><select id="actualForm"><option>clean</option><option>okay</option><option>sloppy</option><option>pain</option></select></div></div></div><button class="primary" onclick="Coach.saveSetLog()">Save Set / Adjust</button></section>`}
function startRest(seconds){state.active.phase='rest';state.active.remain=seconds;state.active.running=true;clearInterval(state.active.timer);state.active.timer=setInterval(()=>{if(!state.active||!state.active.running)return;state.active.remain=Math.max(0,(state.active.remain||0)-1);if(state.active.remain<=0){state.active.running=false;clearInterval(state.active.timer);speak('Rest complete. Press ready when setup is complete.',true)}save();render()},1000);speak(`Rest ${seconds} seconds. Change weight if needed. Timer does not force the next set.`);save();render()}
function restView(it){return`<section class="timer"><div class="timerTop"><button onclick="Coach.exitWorkout()">Exit</button><b>${esc(it.name)}</b><button onclick="Coach.endRest()">Ready</button></div><div class="timerHero"><div class="timerSub">REST / CHANGE WEIGHT IF NEEDED</div><div class="time">${fmt(state.active.remain)}</div><div class="cueCard"><div class="cueRow"><b>Next</b><span>${esc(nextSetText(it))}</span></div><div class="cueRow"><b>Rule</b><span>The timer supports rest. It does not force the next set. Press Ready when loaded and set up.</span></div></div></div><div class="actions"><button class="pause" onclick="Coach.toggleRest()">${state.active.running?'Pause':'Resume'}</button><button class="done" onclick="Coach.endRest()">Ready</button></div></section>`}
function nextSetText(it){const n=it.sets[state.active.setIdx];if(!n)return'Next exercise';return`Set ${n.set}: ${n.suggestedLoad?n.suggestedLoad+' lb':''} · target ${it.target}`}
function saveSetLog(){const it=currentItem(),a=state.active,set=it.sets[a.setIdx];const actualLoad=+($('actualLoad').value||0),reps=+($('actualReps').value||0),rir=$('actualRir').value,speed=$('actualSpeed').value,form=$('actualForm').value;Object.assign(set,{actualLoad,actualReps:reps,rir,speed,form,complete:true});const adj=adjustNextLoad(it,set);set.note=adj.note;a.logs.push({exercise:it.name,set:set.set,actualLoad,reps,rir,speed,form,note:adj.note});if(form==='pain')state.readiness.pain=true;if(a.setIdx<it.sets.length-1){a.setIdx++;it.sets[a.setIdx].suggestedLoad=adj.nextLoad;speak(adj.note+` Next set ${adj.nextLoad?adj.nextLoad+' pounds':'bodyweight'}.`,true);startRest(it.rest||90)}else{saveExerciseSummary(it);nextItem()}}
function adjustNextLoad(it,set){const reps=+set.actualReps||0,load=+set.actualLoad||0,min=set.targetMin||1,max=set.targetMax||99,rir=String(set.rir)==='3+'?3:+set.rir||0;let next=load,note='Good set: keep load.';if(set.form==='pain')return{nextLoad:0,note:'Pain reported: stop this exercise and switch to recovery.'};if(set.form==='sloppy'||set.speed==='slow'){next=round5(load*.90);note='Speed/form dropped: reduce load.'}else if(it.mode==='loaded_power'){if(reps>=max&&set.speed==='fast'&&rir>=2){next=round5(load*1.05);note='Fast and clean: small load increase allowed.'}else note='Power stayed clean: keep load.'}else if(it.mode==='hypertrophy'){if(reps>max&&rir>=2){next=round5(load*1.08);note='Above rep range with reps in reserve: increase load.'}else if(reps<min){next=round5(load*(reps<min-2?.88:.94));note='Below hypertrophy rep range: reduce load.'}else if(rir===0){next=round5(load*.95);note='Too close to failure: reduce slightly.'}}else{if(reps>max&&rir>=2){next=round5(load*1.05);note='Above strength target and still had reps: increase slightly.'}else if(reps<min){next=round5(load*.90);note='Below strength target: reduce load.'}else if(rir===0){next=round5(load*.95);note='Too close to failure: reduce slightly.'}}if(!load)next=0;return{nextLoad:next,note}}
function saveExerciseSummary(it){const logs=state.active.logs.filter(x=>x.exercise===it.name);if(!logs.length)return;const last=logs[logs.length-1],good=logs.filter(x=>x.form==='clean'||x.form==='okay'),avg=good.length?good.reduce((s,x)=>s+(+x.actualLoad||0),0)/good.length:0;const nextStart=round5((it.sets.find(s=>!s.complete)?.suggestedLoad)||last.actualLoad||avg);const summary=logs.map(x=>`${x.actualLoad||0}x${x.reps} (${x.rir} RIR)`).join(', ');if(!state.exerciseHistory[it.name])state.exerciseHistory[it.name]=[];state.exerciseHistory[it.name].push({at:todayISO(),summary,nextStart,logs});state.exerciseHistory[it.name]=state.exerciseHistory[it.name].slice(-12)}
function nextItem(){state.active.idx++;state.active.setIdx=0;state.active.phase='setup';state.active.running=false;if(state.active.idx>=state.active.workout.items.length){finishActiveWorkout();return}save();render();speak(`Next exercise: ${currentItem().name}. Set up, then press start when ready.`)}
function skipItem(){nextItem()}function endRest(){clearInterval(state.active.timer);state.active.phase='setup';state.active.running=false;save();render();speak('Ready for the next set. Start when setup is complete.')}function toggleRest(){state.active.running=!state.active.running;save();render()}
function performanceActiveView(it){if(state.active.phase==='rest')return restView(it);const s=it.sets[state.active.setIdx]||it.sets[0];return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag orange">Performance Power</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${s.set}/${it.sets.length}</b><span>set</span></div><div class="setBox"><b>${s.targetReps}</b><span>reps</span></div><div class="setBox"><b>${it.rest}s</b><span>rest</span></div></div></div><button class="primary" onclick="Coach.completePerformanceSet('fast')">Done — Fast/Clean</button><div style="height:10px"></div><button class="secondary" onclick="Coach.completePerformanceSet('slow')">Done — Slowed Down</button></section>`}
function completePerformanceSet(q){const it=currentItem();it.sets[state.active.setIdx].quality=q;it.sets[state.active.setIdx].complete=true;if(q==='slow'){state.active.logs.push({exercise:it.name,note:'Quality dropped; power work should stop or rest longer.'});speak('Quality dropped. Stop power work or rest longer.')}if(state.active.setIdx<it.sets.length-1){state.active.setIdx++;startRest(it.rest||60)}else nextItem()}
function timedActiveView(it){if(!state.active.timed)state.active.timed={round:1,phase:'instruction',remain:3,running:false};const t=state.active.timed;if(t.phase==='work'||t.phase==='rest')return timedTimerView(it,t);return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag green">Timed Coach</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${t.round}/${it.rounds}</b><span>round</span></div><div class="setBox"><b>${it.work}s</b><span>work</span></div><div class="setBox"><b>${it.rest}s</b><span>rest</span></div></div></div><button class="primary" onclick="Coach.startTimedWork()">3…2…1 Start</button><div style="height:10px"></div><button class="secondary" onclick="Coach.skipItem()">Skip Exercise</button></section>`}
function startTimedWork(){const t=state.active.timed;t.phase='work';t.remain=currentItem().work;t.running=true;speak(`Starting ${currentItem().name}. 3, 2, 1, go.`,true);runTimedTick();save();render()}
function timedTimerView(it,t){return`<section class="timer"><div class="timerTop"><button onclick="Coach.exitWorkout()">Exit</button><b>Round ${t.round}/${it.rounds}</b><button onclick="Coach.nextTimedPhase()">Skip</button></div><div class="timerHero"><h2>${esc(it.name)}</h2><div class="timerSub">${t.phase.toUpperCase()}</div><div class="time">${fmt(t.remain)}</div><div class="cueCard"><div class="cueRow"><b>Cue</b><span>${esc(it.cue)}</span></div><div class="cueRow"><b>Power Rule</b><span>${it.intent&&it.intent.includes('power')?'Stop if speed drops. More rest than work is intentional.':'Move cleanly through the timer.'}</span></div></div></div><div class="actions"><button class="pause" onclick="Coach.pauseTimed()">${t.running?'Pause':'Resume'}</button><button class="done" onclick="Coach.nextTimedPhase()">Done / Next</button></div></section>`}
function runTimedTick(){clearInterval(state.active.timer);state.active.timer=setInterval(()=>{let t=state.active&&state.active.timed;if(!t||!t.running)return;t.remain=Math.max(0,t.remain-1);if(t.remain<=0)nextTimedPhase();save();render()},1000)}
function pauseTimed(){let t=state.active.timed;t.running=!t.running;if(t.running)runTimedTick();save();render()}function nextTimedPhase(){let it=currentItem(),t=state.active.timed;clearInterval(state.active.timer);if(t.phase==='work'&&it.rest>0){t.phase='rest';t.remain=it.rest;t.running=true;speak('Rest.',true);runTimedTick()}else{if(t.round<it.rounds){t.round++;t.phase='instruction';t.remain=3;t.running=false;speak(`Next round ${t.round}.`,true)}else{delete state.active.timed;nextItem();return}}save();render()}
function swimActiveView(it){return`<section class="screen noTab">${activeTop(it)}<div class="card"><span class="tag blue">Swim Coach</span><h2>${esc(it.name)}</h2><p>${esc(it.cue)}</p><div class="setGrid" style="margin-top:12px"><div class="setBox"><b>${it.rounds}</b><span>rounds</span></div><div class="setBox"><b>${it.lengths}</b><span>lengths</span></div><div class="setBox"><b>${state.env.pool.length} ${state.env.pool.unit}</b><span>pool</span></div></div><p class="note" style="margin-top:12px">${esc(swimDistanceText(it.lengths,it.rounds))}</p></div><div class="warn">Do not swim alone. Kids need adult supervision. No underwater breath-hold challenges.</div><div style="height:12px"></div><button class="primary" onclick="Coach.skipItem()">Completed Swim Block</button><div style="height:10px"></div><button class="secondary" onclick="Coach.skipItem()">Skip Block</button></section>`}
function finishActiveWorkout(){const rec={at:todayISO(),title:state.active.workout.title,mode:state.active.workout.mode,role:state.active.workout.role,logs:state.active.logs||[],bodyLoad:state.active.workout.bodyLoad,feedbackStatus:'saved'};state.history.push(rec);state.history=state.history.slice(-180);state.active=null;state.view='today';state.planDay++;if(state.planDay>state.days){state.planDay=1;state.week++}regenerate(false);save();render();speak('Workout complete. Saved to history.',true)}
function exitWorkout(){clearInterval(state.active&&state.active.timer);state.active=null;state.view='today';save();render();speak('Workout exited.',true)}
function manualLog(){const ex=$('manualExercise').value.trim()||'Manual Lift',load=+($('manualLoad').value||0),reps=+($('manualReps').value||0),rir=$('manualRir').value;if(!state.exerciseHistory[ex])state.exerciseHistory[ex]=[];const nextStart=round5(load*(reps>=15?1.05:reps<8?.92:1));state.exerciseHistory[ex].push({at:todayISO(),summary:`${load}x${reps} (${rir} RIR)`,nextStart,logs:[{actualLoad:load,reps,rir}]});state.history.push({at:todayISO(),title:`Manual Log — ${ex}`,mode:'manual',logs:[{exercise:ex,actualLoad:load,reps,rir}],bodyLoad:bodyLoadFromWorkout({logs:[{exercise:ex}]})});save();render();speak('Manual set saved.',true)}
function addOutsideActivity(){const type=$('olType').value,intensity=$('olIntensity').value,startDay=+$('olStart').value||1,endDay=+$('olEnd').value||startDay,count=+$('olCount').value||1,duration=+$('olDuration').value||60,body=$('olBody').value,label=$('olLabel').value||cap(type);state.outsideActivities.push({type,intensity,startDay,endDay,count,duration,body,label,at:todayISO()});state.readiness.override=false;regenerate()}
function removeOutsideActivity(i){state.outsideActivities.splice(i,1);regenerate()}
function toggleSoreRegion(k){state.readiness.soreRegions=state.readiness.soreRegions||[];const i=state.readiness.soreRegions.indexOf(k);if(i>=0)state.readiness.soreRegions.splice(i,1);else state.readiness.soreRegions.push(k);regenerate()}
function clearSoreness(){state.readiness.soreRegions=[];state.readiness.soreness='None';regenerate()}
function clearPreviewPlan(){delete state._previewPlanDay}function go(v){state.view=v;save();render()}function setGoal(g){state.goal=g;state.planDay=1;clearPreviewPlan();regenerate()}function setProfile(k,v){state.profile[k]=['age','heightFt','heightIn','weight'].includes(k)?Number(v):v;clearPreviewPlan();regenerate()}function setState(k,v){state[k]=Number(v)||v;if(k==='days'){state.planDay=1;clearPreviewPlan();state.calendar.scheduledDays=defaultScheduleForDays(state.days);state.calendar.trainTodayOverride=false;state.calendar.skipToday=false}regenerate()}function setEnv(k,v){state.env[k]=v;clearPreviewPlan();regenerate()}function setPool(k,v){state.env.pool[k]=k==='length'?Number(v):v;if(k==='available'&&v){if(!hasEq('Pool'))state.env.eq.push('Pool');state.env.space='Pool'}clearPreviewPlan();regenerate()}function toggleEq(e){if(e==='None')state.env.eq=['None','Mat'];else{state.env.eq=state.env.eq.filter(x=>x!=='None');const i=state.env.eq.indexOf(e);if(i>=0)state.env.eq.splice(i,1);else state.env.eq.push(e);if(!state.env.eq.length)state.env.eq=['None','Mat'];if(e==='Pool')state.env.pool.available=hasEq('Pool')}clearPreviewPlan();regenerate()}function setReadiness(k,v){state.readiness[k]=v;regenerate()}function toggleOverride(){if(!state.readiness.pain){state.readiness.override=!state.readiness.override;regenerate()}else{state.readiness.override=false;regenerate()}}function toggleScheduleDay(d){d=Number(d);let days=normalizeScheduleDays(),i=days.indexOf(d);if(i>=0&&days.length>1)days.splice(i,1);else if(i<0)days.push(d);state.calendar.scheduledDays=[...new Set(days)].sort((a,b)=>a-b);state.days=state.calendar.scheduledDays.length;state.calendar.trainTodayOverride=false;state.calendar.skipToday=false;state.planDay=1;clearPreviewPlan();regenerate()}function advanceCalendarDay(n){clearPreviewPlan();const d=appNow();d.setDate(d.getDate()+(Number(n)||0));state.calendar.currentDate=localDateISO(d);state.calendar.lastSeenDate=state.calendar.currentDate;state.calendar.useSimDate=true;state.calendar.trainTodayOverride=false;state.calendar.skipToday=false;state.readiness.override=false;state.setupReady=false;state.workout=null;regenerate()}function skipToday(){clearPreviewPlan();state.calendar.skipToday=true;state.calendar.trainTodayOverride=false;state.readiness.override=false;state.setupReady=false;state.workout=null;regenerate()}function useRealToday(){clearPreviewPlan();state.calendar.useSimDate=false;state.calendar.currentDate=localDateISO();state.calendar.lastSeenDate=state.calendar.currentDate;state.calendar.trainTodayOverride=false;state.calendar.skipToday=false;state.readiness.override=false;state.setupReady=false;state.workout=null;regenerate()}function trainTodayAnyway(){clearPreviewPlan();state.calendar.trainTodayOverride=true;state.calendar.skipToday=false;state.readiness.override=true;state.setupReady=false;state.workout=null;regenerate()}function toggleVoice(){state.settings.voice=!state.settings.voice;save();render();if(state.settings.voice)testVoice()}function testVoice(){speak('Voice cues are on. I will explain setup, set targets, countdowns, rest, and next exercises.',true)}function previewSlotStep(delta){const slots=normalizeScheduleDays().length||Math.max(1,+state.days||1),current=Math.max(1,Math.min(slots,+state._previewPlanDay||trainingOrdinalForToday()||state.planDay||1));let next=((current-1+(Number(delta)||0))%slots+slots)%slots+1;state._previewPlanDay=next;state.planDay=next;state.setupReady=false;state.workout=null;regenerate()}function nextDay(){previewSlotStep(1)}function prevDay(){previewSlotStep(-1)}function clearHistory(){state.history=[];state.exerciseHistory={};save();render()}
function render(){ensure();const map={today:todayView,setup:setupView,week:weekView,readiness:readinessView,profile:profileView,log:logView,history:historyView,active:activeView};try{$('app').innerHTML=(map[state.view]||todayView)()}catch(e){$('app').innerHTML=`<section class="screen noTab"><div class="card"><h3>Error</h3><p>${esc(e.message)}</p><pre class="small">${esc(e.stack||'')}</pre><button class="danger" onclick="localStorage.removeItem('${STORE}');location.reload()">Reset</button></div></section>`;console.error(e)}}
window.Coach={go,regenerate,startSetup,beginWorkout,setGoal,setProfile,setState,setEnv,setPool,toggleEq,nextDay,prevDay,clearHistory,exitWorkout,startLiftSet,finishLiftSet,saveSetLog,skipItem,endRest,toggleRest,completePerformanceSet,startTimedWork,pauseTimed,nextTimedPhase,manualLog,addOutsideActivity,removeOutsideActivity,setReadiness,toggleSoreRegion,clearSoreness,toggleOverride,toggleVoice,testVoice,toggleScheduleDay,advanceCalendarDay,skipToday,useRealToday,trainTodayAnyway,bodyMap,weeklySafetyGovernor,hardWindowConflict,outsideSummary,regionDaysBack,currentStressLedger,hardSessionsLast,normalizeScheduleDays,isScheduledTrainingDay,bodyRegions:BODY_REGIONS,bodyLabels:BODY_LABELS,debugState:()=>state,localDateISO};
window.onerror=function(msg,src,line,col,err){const app=$('app');if(app)app.innerHTML=`<section class="screen noTab"><div class="card"><h3>Error</h3><p>${esc(msg)}</p><p class="small">Line ${line}</p><button class="danger" onclick="localStorage.removeItem('${STORE}');location.reload()">Reset App Data</button></div></section>`;console.error(err||msg)};
load();render();
})();
