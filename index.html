<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coach Prototype v20.9 Bright</title>
<style>
:root{
  --bg:#f6f8fb;
  --panel:#ffffff;
  --panel2:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --accent:#2563eb;
  --accent2:#0ea5e9;
  --good:#059669;
  --warn:#f97316;
  --bad:#dc2626;
  --shadow:0 18px 50px rgba(15,23,42,.12);
}
*{box-sizing:border-box}
html{background:#f6f8fb}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#dbeafe 0,#f6f8fb 36%,#f8fafc 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
button,input,select{font:inherit}
button{cursor:pointer}
.app{
  width:min(430px,100%);
  min-height:100vh;
  margin:0 auto;
  padding:20px 18px 112px;
  background:rgba(246,248,251,.96);
  border-left:1px solid rgba(148,163,184,.32);
  border-right:1px solid rgba(148,163,184,.32);
  box-shadow:var(--shadow);
}
.top{padding:12px 0 14px}
.eyebrow{
  display:inline-flex;
  align-items:center;
  background:#e0f2fe;
  color:#075985;
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:900;
}
.top h1{margin:8px 0 4px;font-size:34px;line-height:1.02;letter-spacing:-.04em;color:#0f172a}
.top p{margin:0;color:var(--muted);line-height:1.35;font-weight:600}
.card{
  background:var(--panel);
  border:1px solid rgba(226,232,240,.95);
  border-radius:24px;
  padding:16px;
  margin:12px 0;
  box-shadow:0 12px 30px rgba(15,23,42,.08);
}
.card h3{margin:0 0 9px;font-size:18px;letter-spacing:-.02em;color:#0f172a}
.small{font-size:13px;color:var(--muted);line-height:1.38;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.presetGrid,.outcomeGrid{display:grid;grid-template-columns:1fr;gap:10px}
.preset,.outcome,.chip,.secondary,.primary,.danger{
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  color:var(--text);
  padding:12px;
  text-align:left;
  box-shadow:0 6px 16px rgba(15,23,42,.05);
}
.preset span,.outcome span{display:block;color:var(--muted);font-size:12px;margin-top:4px;line-height:1.25;font-weight:600}
.preset.active,.outcome.active,.chip.active{
  border-color:#38bdf8;
  background:linear-gradient(180deg,#eff6ff,#e0f2fe);
  box-shadow:0 0 0 2px rgba(37,99,235,.12),0 10px 24px rgba(14,165,233,.16);
}
.primary{
  width:100%;
  background:linear-gradient(135deg,#2563eb,#0ea5e9);
  border-color:#2563eb;
  color:white;
  text-align:center;
  font-weight:900;
  box-shadow:0 12px 28px rgba(37,99,235,.24);
}
.secondary{text-align:center;background:#f8fafc;color:#0f172a;font-weight:800}
.danger{background:#fef2f2;border-color:#fecaca;color:#991b1b;text-align:center;font-weight:900}
.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.voiceSelect{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  outline:none;
  box-shadow:0 3px 10px rgba(15,23,42,.04) inset;
}
.field input:focus,.field select:focus,.voiceSelect:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(14,165,233,.15)}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 11px;font-weight:800}.row{display:flex;gap:10px}.row>*{flex:1}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.stat{border:1px solid var(--line);border-radius:18px;padding:12px;background:linear-gradient(180deg,#ffffff,#f8fafc);box-shadow:0 6px 14px rgba(15,23,42,.05)}
.stat b{font-size:20px;color:#0f172a}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:800}
.phase{border-left:5px solid var(--accent);padding:10px 0 10px 13px;margin:14px 0;background:linear-gradient(90deg,rgba(219,234,254,.85),rgba(255,255,255,0));border-radius:16px}
.phase h4{margin:0 0 3px;color:#0f172a}.phase p{margin:0 0 8px;color:var(--muted);font-size:13px;font-weight:600}
.item{display:flex;gap:10px;padding:9px 0;border-top:1px solid rgba(226,232,240,.9)}
.item .num{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:900;flex:0 0 auto}
.item b{display:block;color:#0f172a}.item span{display:block;color:var(--muted);font-size:12px;font-weight:600}
.mixRow{display:grid;grid-template-columns:118px 1fr 42px;gap:8px;align-items:center;margin:8px 0;color:#334155;font-weight:800}
.bar{height:12px;border-radius:99px;background:#e2e8f0;overflow:hidden;border:1px solid #cbd5e1}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#22c55e)}
.note{padding:9px 0;border-top:1px solid rgba(226,232,240,.95);color:#334155;font-weight:600}
.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.94);border-top:1px solid var(--line);display:flex;justify-content:center;padding:8px;z-index:10;backdrop-filter:blur(12px)}
.tabs .inner{max-width:430px;width:100%;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.tabs button{border:1px solid var(--line);background:#fff;color:#64748b;border-radius:14px;padding:10px 6px;font-weight:900;box-shadow:0 5px 12px rgba(15,23,42,.05)}
.tabs button.active{background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;border-color:#2563eb}
.tag{display:inline-block;font-size:12px;color:#075985;background:#e0f2fe;border:1px solid #bae6fd;padding:5px 9px;border-radius:999px;margin:3px;font-weight:900}
.planRow{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-top:1px solid rgba(226,232,240,.95)}
.badge{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;background:#dbeafe;color:#1d4ed8;font-weight:900;flex:0 0 auto}
.error{border-color:var(--bad);background:#fff1f2}
@media(min-width:760px){.app{margin:24px auto;min-height:850px;border:1px solid rgba(148,163,184,.45);border-radius:38px;overflow:hidden}.tabs .inner{max-width:430px}}
@media(max-width:560px){.app{width:100%;box-shadow:none;border-left:0;border-right:0}.stats{grid-template-columns:1fr}.mixRow{grid-template-columns:104px 1fr 36px}.top h1{font-size:30px}}
</style>
</head>

function logicHtml(){return '<div class="card"><h3>Trainer Logic</h3>'+state.logicNotes.map(function(n){return '<div class="note">• '+esc(n)+'</div>'}).join('')+'</div>'}
function phaseHtml(){return state.phases.map(function(p){return '<div class="phase"><h4>'+esc(p.title)+'</h4><p>'+esc((methodLabels[p.method]||cap(p.method))+' · '+p.note)+'</p>'+p.items.map(function(b,i){return '<div class="item"><div class="num">'+(i+1)+'</div><div><b>'+esc(b.n)+'</b><span>'+esc(cap(b.cat))+' · Work '+b.work+' sec · Rest '+b.rest+' sec</span></div></div>'}).join('')+'</div>'}).join('')}
function todayView(){var p=todayPlan();return '<section>'+header('Coach','v20.9 adds balanced hypertrophy programming with upper/lower sets and cleaner 45-minute scaling.','Fitness v20.9 Clean')+'<div class="card"><span class="eyebrow">Current Build</span><h3>'+esc(currentGoalTitle())+'</h3><p>'+esc(selectedOutcomeText())+'</p><div class="stats"><div class="stat"><b>W'+state.planWeek+'</b><span>block</span></div><div class="stat"><b>D'+state.planDay+'</b><span>day</span></div><div class="stat"><b>'+fmt(totalSec())+'</b><span>today</span></div></div></div>'+bodyNoteCard()+'<div class="card"><span class="eyebrow">Today’s Workout</span><h3>'+esc(p.name)+'</h3><p>'+esc((methodLabels[p.method]||p.method)+' · '+p.focus)+'</p></div>'+logicHtml()+'<div class="row"><button class="primary" onclick="Coach.rebuild()">Generate Workout</button><button class="secondary" onclick="Coach.nextDay()">Mark Done / Next Day</button></div><div class="card"><h3>Workout Preview</h3>'+phaseHtml()+'</div>'+tabs()+'</section>'}
function planView(){var plan=planForGoal();return '<section>'+header('Plan','Weekly order follows the selected focus. Body context changes caps and substitutions, not the main goal.','Plan')+'<div class="card"><h3>'+esc(currentGoalTitle())+'</h3><p>'+esc(selectedOutcomeText())+'</p><p class="small">'+(personalFocusActive()?'Personal focus override is active.':'Preset defaults are active.')+'</p>'+mixHtml()+'</div><div class="card"><h3>Weekly Schedule</h3>'+plan.map(function(p,i){return '<div class="planRow"><div class="badge">D'+(i+1)+'</div><div><b>'+esc(p.name)+'</b><p class="small">'+esc(p.focus)+'</p><span class="tag">'+esc(p.stress)+'</span><span class="tag">'+esc(methodLabels[p.method]||p.method)+'</span><span class="tag">'+esc(p.type)+'</span></div></div>'}).join('')+'</div>'+tabs()+'</section>'}
function goalsForPreset(){var preset=currentPreset(),allowed=new Set(preset.defaultGoals);outcomeGoals.forEach(function(g){var score=0;Object.keys(g.mix).forEach(function(k){score+=(preset.mix[k]||0)*(g.mix[k]||0)});if(score>350)allowed.add(g.id)});if(state.customGoals)state.outcomes.forEach(function(id){allowed.add(id)});var sections={};outcomeGoals.forEach(function(g){if(allowed.has(g.id)){if(!sections[g.section])sections[g.section]=[];sections[g.section].push(g)}});return sections}
function quickAthleteButtons(){return '<div class="card"><h3>Quick Test Athletes</h3><p class="small">Use these to verify that age, height, and weight are all applied.</p><div class="grid">'+['Logan','Kayde','Zoe','LaNea'].map(function(n){var p={Logan:'8 · 4\'7 · 80',Kayde:'12 · 5\'8 · 100',Zoe:'14 · 6\'0 · 150',LaNea:'16 · 5\'9 · 165'}[n];return '<button class="secondary" onclick="Coach.quick(\''+n+'\')"><b>'+n+'</b><br><span class="small">'+p+'</span></button>'}).join('')+'</div></div>'}
function profileView(){var sections=goalsForPreset();return '<section>'+header('Profile','Choose style first. Then choose personal focus; custom picks override the style focus.','Settings')+'<div class="card"><h3>Style / Build Preset</h3><p class="small">Style is the training menu. Custom goals are the final focus.</p><div class="presetGrid">'+buildPresets.map(function(p){return '<button class="preset '+(state.buildPreset===p.id?'active':'')+'" onclick="Coach.setPreset(\''+p.id+'\')"><strong>'+esc(p.title)+'</strong><span>'+esc(p.desc)+'</span></button>'}).join('')+'</div></div><div class="card"><h3>Specific Personal Focus</h3><p class="small">Pick one or more. These override the style focus.</p><button class="secondary" onclick="Coach.resetFocus()">Reset to style defaults</button><div style="height:10px"></div>'+Object.keys(sections).map(function(sec){return '<div class="eyebrow" style="margin-top:12px">'+esc(sec)+'</div><div class="outcomeGrid">'+sections[sec].map(function(o){return '<button class="outcome '+(state.outcomes.indexOf(o.id)>=0?'active':'')+'" onclick="Coach.toggleOutcome(\''+o.id+'\')"><strong>'+esc(o.title)+'</strong><span>'+esc(o.desc)+'</span></button>'}).join('')+'</div>'}).join('')+'</div>'+quickAthleteButtons()+bodyNoteCard()+'<div class="card"><h3>Coach Training Mix</h3>'+mixHtml()+'</div>'+athleteCard()+environmentCard()+tabs()+'</section>'}
function athleteCard(){return '<div class="card"><h3>Athlete + Schedule</h3><div class="grid"><div class="field"><label>Age</label><input type="number" value="'+state.age+'" onchange="Coach.set(\'age\',Number(this.value))"></div><div class="field"><label>Sex</label><select onchange="Coach.set(\'sex\',this.value)"><option '+(state.sex==='Female'?'selected':'')+'>Female</option><option '+(state.sex==='Male'?'selected':'')+'>Male</option></select></div><div class="field"><label>Height ft</label><input type="number" value="'+state.heightFt+'" onchange="Coach.set(\'heightFt\',Number(this.value))"></div><div class="field"><label>Height in</label><input type="number" value="'+state.heightIn+'" onchange="Coach.set(\'heightIn\',Number(this.value))"></div><div class="field"><label>Bodyweight</label><input type="number" value="'+state.body+'" onchange="Coach.set(\'body\',Number(this.value))"></div><div class="field"><label>Workout Minutes</label><select onchange="Coach.set(\'min\',Number(this.value))">'+[10,15,20,25,30,35,40,45,60].map(function(n){return '<option '+(state.min===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div><div class="field"><label>Days/week</label><select onchange="Coach.set(\'days\',Number(this.value))">'+[1,2,3,4,5,6].map(function(n){return '<option '+(state.days===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div></div><p class="small">Height is required for lever read and weight-density logic.</p></div>'}
function environmentCard(){return '<div class="card"><h3>Workout Environment</h3><div class="field"><label>Space</label><select onchange="Coach.set(\'space\',this.value)">'+spaces.map(function(s){return '<option '+(state.space===s?'selected':'')+'>'+s+'</option>'}).join('')+'</select></div><div style="height:12px"></div><div class="chips">'+equipment.map(function(e){return '<button class="chip '+(hasEq(e)?'active':'')+'" onclick="Coach.toggleEq(\''+e+'\')">'+esc(e)+'</button>'}).join('')+'</div></div>'}
function testView(){return '<section>'+header('Testing','Simple placeholders for future monthly tests.','Test')+'<div class="card"><h3>Monthly Test Inputs</h3><div class="grid">'+['vertical','broad','sprint','shuttle','endurance','plank'].map(function(k){return '<div class="field"><label>'+cap(k)+'</label><input value="'+esc(state.tests[k]||'')+'" onchange="Coach.setTest(\''+k+'\',this.value)"></div>'}).join('')+'</div></div>'+tabs()+'</section>'}
function progressView(){return '<section>'+header('Progress','Progress logic will use completed workouts and monthly tests.','Progress')+'<div class="card"><h3>Current Focus</h3><p>'+esc(selectedOutcomeText())+'</p><p class="small">Next build can add stars, completion history, and reward logic.</p></div>'+tabs()+'</section>'}
function render(){try{ensureState();if(!state.blocks.length)buildWorkout(false);var map={today:todayView,plan:planView,test:testView,progress:progressView,profile:profileView};$('app').innerHTML=(map[state.view]||todayView)()}catch(e){$('app').innerHTML='<section>'+header('Coach','The app caught an error instead of crashing.','Error')+'<div class="card error"><h3>Error</h3><p>'+esc(e.message)+'</p><pre class="small">'+esc(e.stack||'')+'</pre></div>'+tabs()+'</section>';console.error(e)}}
window.Coach={tab:function(v){state.view=v;saveSettings();render()},set:function(k,v){state[k]=v;buildWorkout(true);render()},setPreset:function(id){state.buildPreset=id;state.outcomes=currentPreset().defaultGoals.slice(0,3);state.customGoals=false;state.planDay=1;buildWorkout(true);render()},toggleOutcome:function(id){state.customGoals=true;if(state.outcomes.indexOf(id)>=0)state.outcomes=state.outcomes.filter(function(x){return x!==id});else state.outcomes.push(id);if(!state.outcomes.length)state.outcomes=[currentPreset().defaultGoals[0]];state.planDay=1;buildWorkout(true);render()},resetFocus:function(){state.outcomes=currentPreset().defaultGoals.slice(0,3);state.customGoals=false;state.planDay=1;buildWorkout(true);render()},toggleEq:function(e){if(hasEq(e))state.eq=state.eq.filter(function(x){return x!==e});else state.eq.push(e);buildWorkout(true);render()},quick:function(name){var p={Logan:{age:8,sex:'Male',heightFt:4,heightIn:7,body:80},Kayde:{age:12,sex:'Male',heightFt:5,heightIn:8,body:100},Zoe:{age:14,sex:'Female',heightFt:6,heightIn:0,body:150},LaNea:{age:16,sex:'Female',heightFt:5,heightIn:9,body:165}}[name];Object.keys(p).forEach(function(k){state[k]=p[k]});buildWorkout(true);render()},nextDay:function(){state.planDay++;if(state.planDay>Math.max(1,state.days)){state.planDay=1;state.planWeek++}buildWorkout(true);render()},rebuild:function(){buildWorkout(true);render()},setTest:function(k,v){state.tests[k]=v;saveSettings()}};
loadSettings();buildWorkout(false);render();
})();
</script>
</body>
</html>
