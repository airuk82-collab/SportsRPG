function finishWorkout(){updateRecovery();state.history=(state.history||[]).concat([{templateId:state.currentTemplate.id,title:state.currentTemplate.title,theme:state.currentTemplate.theme,type:state.type,at:new Date().toISOString(),effort:state.finish.effort,quality:state.finish.quality}]).slice(-20);state.view='finish';resetActive(false);saveSettings();render();speak('complete','Workout complete. Answer the finish questions so I can protect recovery next time.',true)}
function trainingMix(){var mix={strength:0,power:0,hypertrophy:0,endurance:0,movement:0,sport:0,control:0,recovery:0};var t=state.type;if(t==='strength'){mix.strength=55;mix.control=15;mix.power=10;mix.movement=10;mix.recovery=10}if(t==='power'){mix.power=55;mix.strength=15;mix.control=15;mix.movement=10;mix.recovery=5}if(t==='build_muscle'){mix.hypertrophy=55;mix.strength=15;mix.control=10;mix.movement=10;mix.recovery=10}if(t==='endurance'){mix.endurance=55;mix.movement=15;mix.strength=10;mix.control=10;mix.recovery=10}if(t==='movement'){mix.movement=45;mix.control=25;mix.recovery=20;mix.strength=10}if(t==='sport'){mix.sport=30;mix.power=25;mix.endurance=15;mix.strength=15;mix.control=10;mix.recovery=5}selectedFocuses().forEach(function(f){if(/jump|accelerate|runFaster|firstStep/.test(f))mix.power+=10;if(/contact|bracing|maxForce/.test(f))mix.strength+=10;if(/lastLonger|stamina|aerobic|repeat/.test(f))mix.endurance+=10;if(/mobility|core|balance|control|recovery/.test(f))mix.movement+=10;if(/upper|lower|lean|Muscle/.test(f))mix.hypertrophy+=10});var total=Object.keys(mix).reduce(function(s,k){return s+mix[k]},0)||1;Object.keys(mix).forEach(function(k){mix[k]=Math.round(mix[k]/total*100)});return mix}
function level(v){return v>=8?'heavy':v>=5?'moderate':v>=2?'light':'none'}
function stress(v){return v>=9?'very high':v>=6?'high':v>=3?'moderate':v>=1?'low':'none'}
function header(title,desc,pill,back){return '<div class="topline">'+(back?'<button class="back" onclick="tab(\'today\')">←</button>':'<span></span>')+'<span class="pill">'+esc(pill||'Coach')+'</span></div><div class="header"><h1>'+esc(title)+'</h1><p>'+esc(desc||'')+'</p></div>'}
function tabs(){var arr=[['today','Today'],['plan','Plan'],['profile','Profile'],['progress','Progress'],['finish','Finish']];return '<nav class="tabbar">'+arr.map(function(a){return '<button class="'+(state.view===a[0]?'active':'')+'" onclick="tab(\''+a[0]+'\')">'+a[1]+'</button>'}).join('')+'</nav>'}
function mixHtml(){var m=trainingMix();return Object.keys(m).filter(function(k){return m[k]>0}).sort(function(a,b){return m[b]-m[a]}).map(function(k){return '<div class="mixBar"><b>'+cap(k)+'</b><div class="mixTrack"><div class="mixFill" style="width:'+m[k]+'%"></div></div><span>'+m[k]+'%</span></div>'}).join('')}
function bodyNoteCard(){return '<div class="card"><h3>Body Profile Note</h3><p>'+esc(bodyNote())+'</p></div>'}
function templateCard(){var t=state.currentTemplate||{};return '<div class="card"><span class="phaseLabel">Today\'s Template</span><h3>'+esc(t.title||'Template')+'</h3><p>'+esc(t.note||'')+'</p><div class="methodNote">Template rotation checks focus, recent history, protected muscles, fatigue systems, age, equipment, and space.</div></div>'}
function ledgerCard(title,ledger,keys,fn,desc){return '<div class="card"><h3>'+title+'</h3>'+(desc?'<p class="small">'+esc(desc)+'</p>':'')+keys.map(function(k){return '<div class="metric"><b>'+cap(k)+'</b><span>'+fn(ledger[k]||0)+'</span></div>'}).join('')+'</div>'}
function logicHtml(){return '<div class="logic"><b>Trainer Logic</b>'+state.logicNotes.map(function(n){return '<span>• '+esc(n)+'</span>'}).join('')+'</div>'}
function phaseHtml(){return (state.phases||[]).map(function(p){return '<div class="phaseCard"><div class="phaseHead"><div><b>'+esc(p.title)+'</b><span>'+esc(p.method+' · '+p.note)+'</span></div><div class="phaseTime">'+fmt((p.items||[]).reduce(function(s,b){return s+b.work+b.rest},0))+'</div></div><ul class="phaseItems">'+(p.items||[]).map(function(b){return '<li><b>'+esc(b.n)+'</b> — '+b.work+' sec work / '+b.rest+' sec rest<br><span class="small">'+esc(b.why)+' · '+esc(b.w)+'</span></li>'}).join('')+'</ul></div>'}).join('')}
function todayView(){return '<section class="screen">'+header('Coach','20.6 visuals with 21.6 logic, external guide assets, and click-safe navigation.','Fitness v21.9.1')+'<div class="card"><span class="phaseLabel">Current Build</span><h3>'+esc(currentType().title)+'</h3><p>'+esc(selectedFocusText())+'</p><div class="progressRows"><div class="stat"><b>W'+state.planWeek+'</b><span>block</span></div><div class="stat"><b>D'+state.planDay+'</b><span>day</span></div><div class="stat"><b>'+fmt(totalSec())+'</b><span>today</span></div></div></div>'+bodyNoteCard()+templateCard()+'<div class="card"><h3>Coach Training Mix</h3>'+mixHtml()+'</div>'+ledgerCard('Today\'s Muscle Load',state.muscleLedger,muscleKeys,level)+ledgerCard('Today\'s Fatigue Cost',state.fatigueLedger,fatigueKeys,stress,'Fatigue is separate from muscle load. Squats, hinges, carries, sprints, and plyos protect recovery differently.')+logicHtml()+'<button class="primary" onclick="startSession()">Start Today’s Workout</button><div style="height:10px"></div><button class="secondary" onclick="buildWorkout(true);render()">Generate New Template</button><div class="card"><h3>Workout Preview</h3>'+phaseHtml()+'</div>'+tabs()+'</section>'}
function planView(){var list=templates[state.type]||[];return '<section class="screen">'+header('Plan','Shows the template family Coach rotates through.','Plan')+'<div class="card"><h3>'+esc(currentType().title)+' Template Family</h3>'+list.map(function(t,i){return '<div class="plan"><div class="badge">'+(i+1)+'</div><div><b>'+esc(t.title)+'</b><p>'+esc(t.note)+'</p><span class="methodTag">'+esc(t.kind)+'</span><span class="methodTag">'+esc(t.theme)+'</span></div></div>'}).join('')+'</div><div class="row"><button class="secondary" onclick="prevDay()">Back Day</button><button class="secondary" onclick="nextDay()">Next Day</button></div>'+logicHtml()+tabs()+'</section>'}
function profileView(){var type=currentType();return '<section class="screen">'+header('Profile','Simple choices on top. Coach handles the hidden training method.','Profile')+'<div class="card"><h3>Training Type</h3><div class="presetGrid">'+trainingTypes.map(function(t){return '<button class="preset '+(state.type===t.id?'active':'')+'" onclick="setType(\''+t.id+'\')"><strong>'+esc(t.title)+'</strong><span>'+esc(t.desc)+'</span></button>'}).join('')+'</div></div><div class="card"><h3>Main Focus</h3><p class="small">Pick one main focus and one optional secondary. This prevents seven-goal sport workouts.</p><div class="outcomeGrid">'+type.focus.map(function(f){return '<button class="outcome '+(state.focuses.indexOf(f[0])>=0?'active':'')+'" onclick="toggleFocus(\''+f[0]+'\')"><strong>'+esc(f[1])+'</strong><span>'+esc(f[0])+'</span></button>'}).join('')+'</div></div>'+bodyNoteCard()+'<div class="card"><h3>Athlete + Schedule</h3><div class="grid"><div class="field"><label>Age</label><input type="number" value="'+state.age+'" onchange="setVal(\'age\',Number(this.value))"></div><div class="field"><label>Sex</label><select onchange="setVal(\'sex\',this.value)"><option '+(state.sex==='Female'?'selected':'')+'>Female</option><option '+(state.sex==='Male'?'selected':'')+'>Male</option></select></div><div class="field"><label>Height Ft</label><input type="number" value="'+state.heightFt+'" onchange="setVal(\'heightFt\',Number(this.value))"></div><div class="field"><label>Height In</label><input type="number" value="'+state.heightIn+'" onchange="setVal(\'heightIn\',Number(this.value))"></div><div class="field"><label>Bodyweight</label><input type="number" value="'+state.body+'" onchange="setVal(\'body\',Number(this.value))"></div><div class="field"><label>Workout Minutes</label><select onchange="setVal(\'min\',Number(this.value))">'+[10,15,20,25,30,35,40,45,60].map(function(n){return '<option '+(state.min===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div><div class="field"><label>Days/week</label><select onchange="setVal(\'days\',Number(this.value))">'+[1,2,3,4,5,6].map(function(n){return '<option '+(state.days===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div></div></div><div class="card"><h3>Workout Environment</h3><div class="field"><label>Space</label><select onchange="setVal(\'space\',this.value)">'+spaces.map(function(s){return '<option '+(state.space===s?'selected':'')+'>'+s+'</option>'}).join('')+'</select></div><div style="height:12px"></div><div class="chips">'+equipment.map(function(e){return '<button class="chip '+(hasEq(e)?'active':'')+'" onclick="toggleEq(\''+e+'\')">'+esc(e)+'</button>'}).join('')+'</div></div><div class="card"><h3>Voice</h3><select class="voiceSelect" onchange="setVoiceName(this.value)">'+voiceOptions()+'</select><div class="testGrid"><div class="testItem"><label>Speed</label><input type="range" min="0.7" max="1.2" step="0.01" value="'+state.voiceRate+'" onchange="setVoiceNumber(\'voiceRate\',Number(this.value))"></div><div class="testItem"><label>Pitch</label><input type="range" min="0.7" max="1.3" step="0.01" value="'+state.voicePitch+'" onchange="setVoiceNumber(\'voicePitch\',Number(this.value))"></div><div class="testItem"><label>Volume</label><input type="range" min="0" max="1" step="0.05" value="'+state.voiceVolume+'" onchange="setVoiceNumber(\'voiceVolume\',Number(this.value))"></div></div><div class="row"><button class="secondary" onclick="toggleVoice()">Voice '+(state.voiceOn?'On':'Off')+'</button><button class="secondary" onclick="testVoice()">Test Voice</button></div></div>'+tabs()+'</section>'}
function progressView(){var rec=state.recovery||{};var keys=Object.keys(rec);var recoveryHtml=keys.length?keys.map(function(k){return '<div class="metric"><b>'+cap(k)+'</b><span>'+rec[k]+' day'+(rec[k]===1?'':'s')+'</span></div>'}).join(''):'<p>No protected groups yet.</p>';var recentHtml=((state.history||[]).slice(-8).reverse().map(function(h){return '<div class="metric"><b>'+esc(h.title)+'</b><span>'+new Date(h.at).toLocaleDateString()+'</span></div>'}).join('')||'<p>No workouts completed yet.</p>');return '<section class="screen">'+header('Progress','History and recovery protection used for the next template.','Progress')+'<div class="card"><h3>Recovery Protection</h3>'+recoveryHtml+'</div><div class="card"><h3>Recent Templates</h3>'+recentHtml+'</div><button class="danger" onclick="clearHistory()">Clear History / Recovery</button>'+tabs()+'</section>'}
function finishView(){return '<section class="screen">'+header('Finish','Feedback changes future recovery and template choices.','Finish')+'<div class="card"><h3>Finish Questions</h3><div class="field"><label>Effort</label><select onchange="state.finish.effort=this.value;saveSettings()">'+['5','6','7','8','9','10'].map(function(n){return '<option '+(state.finish.effort===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div><div class="field"><label>Quality</label><select onchange="state.finish.quality=this.value;saveSettings()">'+['Great','Good','OK','Sloppy','Pain'].map(function(n){return '<option '+(state.finish.quality===n?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div><div class="field"><label>Notes</label><input value="'+esc(state.finish.notes)+'" onchange="state.finish.notes=this.value;saveSettings()"></div></div><button class="primary" onclick="finishWorkout()">Save Workout Result</button><div style="height:10px"></div><button class="secondary" onclick="tab(\'today\')">Back to Today</button>'+tabs()+'</section>'}
function activeView(){var a=state.active,b=state.blocks[a.idx]||state.blocks[0],n=state.blocks[a.idx+1],src=b?guideSrc(b.guide||'Bodyweight Squat'):'';var prog=(a.idx/Math.max(1,state.blocks.length))*100;var label=a.phase==='instruction'?'INSTRUCTION':a.phase==='countdown'?'GET READY':a.phase==='work'?'WORK':a.phase==='rest'?'REST':'READY';return '<section class="timer"><div class="timerTop"><button onclick="stopSession()">Exit</button><b>'+(a.idx+1)+'/'+state.blocks.length+'</b><button onclick="nextBlock()">Skip</button></div><div class="bar"><div class="fill" style="width:'+prog+'%"></div></div><div class="timerHero"><h2>'+esc(b?b.n:'Done')+'</h2><div class="timerSub">'+label+' · '+(b?b.work+' seconds · '+cap(b.intent)+' · '+b.w:'')+'</div><div class="time">'+fmt(a.remain)+'</div><div class="count">'+label+'</div><div class="diagram">'+(src?'<img class="guideImg" src="'+src+'" alt="guide">':'<div class="small" style="color:#0f172a;padding:24px">No guide image for this drill.</div>')+'</div><div class="next"><small>Next</small><b>'+esc(a.phase==='rest'?(n?n.n:'Finish'):(a.phase==='work'?'Rest':(n?n.n:'Finish')))+'</b>'+(n?' · '+n.work+' sec':'')+'</div></div><div class="actions"><button class="pause" onclick="toggleRun()">'+(a.running?'Pause':'Resume')+'</button><button class="done" onclick="nextBlock()">Done / Next</button></div></section>'}
function render(){try{ensureState();if(!state.blocks.length)buildWorkout(false);var map={today:todayView,plan:planView,profile:profileView,progress:progressView,finish:finishView,active:activeView};$('app').innerHTML=(map[state.view]||todayView)()}catch(e){$('app').innerHTML='<section class="screen noTab"><div class="card"><h3>Error</h3><p>'+esc(e.message)+'</p><pre class="small">'+esc(e.stack||'')+'</pre></div></section>';console.error(e)}}
function tab(v){state.view=v;saveSettings();render()}
function setType(id){state.type=id;state.focuses=typeById(id).defaultFocus.slice(0,Math.min(2,typeById(id).defaultFocus.length));buildWorkout(true);render()}
function toggleFocus(id){var a=state.focuses||[];if(a.indexOf(id)>=0)a=a.filter(function(x){return x!==id});else{if(a.length>=2)a=a.slice(1);a.push(id)}if(!a.length)a=[currentType().defaultFocus[0]];state.focuses=a;buildWorkout(true);render()}
function setVal(k,v){state[k]=v;buildWorkout(true);render()}
function toggleEq(e){if(e==='None'){state.eq=['None','Mat']}else{state.eq=(state.eq||[]).filter(function(x){return x!=='None'});if(hasEq(e))state.eq=state.eq.filter(function(x){return x!==e});else state.eq.push(e);if(!state.eq.length)state.eq=['None','Mat']}buildWorkout(true);render()}
function nextDay(){decayRecovery();state.planDay++;if(state.planDay>state.days){state.planDay=1;state.planWeek++}buildWorkout(true);render()}
function prevDay(){state.planDay=Math.max(1,state.planDay-1);buildWorkout(true);render()}
function clearHistory(){state.history=[];state.recovery={};buildWorkout(true);render()}
function startSession(){state.view='active';state.active={running:true,paused:false,idx:0,phase:'instruction',remain:instructionSeconds(),timer:null,countTimer:null};saveSettings();render();announceInstruction();startTicker()}
function stopSession(){stopTimers();stopVoice();state.view='today';resetActive(false);saveSettings();render()}
function stopTimers(){try{clearInterval(state.active.timer);clearInterval(state.active.countTimer)}catch(e){}}
function nextBlock(){stopTimers();var a=state.active;if(a.phase==='work'){}a.idx++;if(a.idx>=state.blocks.length){finishWorkout();return}a.phase='instruction';a.remain=instructionSeconds();a.running=true;saveSettings();render();announceInstruction();startTicker()}
function toggleRun(){var a=state.active;a.running=!a.running;saveSettings();render();if(a.running)startTicker();else stopTimers()}
function instructionSeconds(){return 3}
function startTicker(){stopTimers();state.active.timer=setInterval(function(){var a=state.active;if(!a.running)return;if(a.phase==='instruction'){return}a.remain=Math.max(0,(a.remain||0)-1);if(a.remain<=0)advancePhase();saveSettings();render()},1000)}
function advancePhase(){var a=state.active,b=state.blocks[a.idx];if(a.phase==='countdown'){a.phase='work';a.remain=b.work;speak('go-'+a.idx,'Go',false);return}if(a.phase==='work'){if(b.rest>0){a.phase='rest';a.remain=b.rest;speak('rest-'+a.idx,'Rest. Next: '+((state.blocks[a.idx+1]||{}).baseName||'finish'),true)}else nextBlock();return}if(a.phase==='rest'){nextBlock();return}}
function announceInstruction(){var a=state.active,b=state.blocks[a.idx];if(!b)return;var text='Next: '+(b.baseName||b.n)+'. '+(b.why||'Move with control.')+' Work for '+b.work+' seconds. Set up first.';speak('instruction-'+a.idx,text,true);setTimeout(function(){if(state.view==='active'&&state.active.running&&state.active.phase==='instruction'){beginCountdown()}},Math.max(2200,Math.min(5200,text.length*45)))}
function beginCountdown(){var a=state.active;if(!a.running)return;a.phase='countdown';a.remain=4;saveSettings();render();var seq=['3','2','1','Go'],i=0;speak('count-'+a.idx+'-0',seq[0],true);state.active.countTimer=setInterval(function(){i++;if(!state.active.running){clearInterval(state.active.countTimer);return}if(i<seq.length){speak('count-'+state.active.idx+'-'+i,seq[i],false)}else{clearInterval(state.active.countTimer);advancePhase()}},1000)}
function voiceAvailable(){return typeof window!=='undefined'&&'speechSynthesis'in window&&'SpeechSynthesisUtterance'in window}
function voices(){try{return voiceAvailable()?speechSynthesis.getVoices()||[]:[]}catch(e){return[]}}
function voiceOptions(){var v=voices(),cur=state.voiceName||'auto';return '<option value="auto" '+(cur==='auto'?'selected':'')+'>Auto browser voice</option>'+v.map(function(x){return '<option value="'+esc(x.name)+'" '+(cur===x.name?'selected':'')+'>'+esc(x.name+(x.lang?' · '+x.lang:''))+'</option>'}).join('')}
function selectedVoice(){var name=state.voiceName;if(!name||name==='auto')return null;return voices().find(function(v){return v.name===name})||null}
function cleanSpeakText(t){return String(t||'').replace(/[—–]/g,', ').replace(/\s+/g,' ').trim()}
function speak(key,text,cancelFirst){if(!state.voiceOn||!voiceAvailable()||!text)return;try{if(cancelFirst!==false)speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(cleanSpeakText(text));var v=selectedVoice();if(v)u.voice=v;u.rate=Number(state.voiceRate)||.94;u.pitch=Number(state.voicePitch)||1;u.volume=Number(state.voiceVolume)||1;speechSynthesis.speak(u)}catch(e){}}
function stopVoice(){try{if(voiceAvailable())speechSynthesis.cancel()}catch(e){}}
function setVoiceName(v){state.voiceName=v;saveSettings();render()}
function setVoiceNumber(k,v){state[k]=v;saveSettings();render()}
function toggleVoice(){state.voiceOn=!state.voiceOn;saveSettings();render();if(state.voiceOn)testVoice();else stopVoice()}
function testVoice(){speak('test-'+Date.now(),'Voice cues are on. I will explain the exercise first, then count down three, two, one, go.',true)}
window.Coach={buildWorkout:buildWorkout,setType:setType,toggleFocus:toggleFocus};
if(voiceAvailable()){try{speechSynthesis.onvoiceschanged=function(){render()}}catch(e){}}

function guideSrc(name){
 var map={
  'Bodyweight Squat':'assets/guides/bodyweight-squat.jpg',
  'Tempo Squat':'assets/guides/tempo-squat.jpg',
  'Goblet Squat':'assets/guides/goblet-squat.jpg',
  'Dumbbell RDL':'assets/guides/dumbbell-rdl.jpg',
  'Glute Bridge':'assets/guides/glute-bridge.jpg',
  'Reverse Lunge':'assets/guides/reverse-lunge.jpg',
  'Pogo Jumps':'assets/guides/pogo-jumps.jpg',
  'Jump-and-Stick':'assets/guides/jump-and-stick.jpg',
  'Broad Jump':'assets/guides/broad-jump.jpg',
  'Jump Rope':'assets/guides/jump-rope.jpg',
  'Fast Feet':'assets/guides/fast-feet.jpg',
  'Line Hops':'assets/guides/line-hops.jpg',
  'Shuttle Run':'assets/guides/shuttle-run.jpg',
  'Pushups':'assets/guides/pushups.jpg',
  'Shoulder Press':'assets/guides/shoulder-press.jpg',
  'Band Row':'assets/guides/band-row.jpg',
  'Dumbbell Row':'assets/guides/dumbbell-row.jpg',
  'Plank':'assets/guides/plank.jpg',
  'Dead Bug':'assets/guides/dead-bug.jpg',
  'Hip Flexor Stretch':'assets/guides/hip-flexor-stretch.jpg',
  'Farmer Carry':'assets/guides/farmer-carry.jpg',
  'Burpees':'assets/guides/burpees.jpg',
  'Step-Up':'assets/guides/step-up.jpg',
  'Side Plank':'assets/guides/side-plank.jpg',
  'Incline Pushup':'assets/guides/incline-pushup.jpg',
  'Med Ball Slam':'assets/guides/med-ball-slam.jpg'
 };
 return map[name]||'';
}

loadSettings();buildWorkout(true);render();
</script>
