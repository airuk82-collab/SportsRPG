function muscleFor(b){var n=b.baseName||b.n,out={};function addMuscle(k,v){out[k]=Math.max(out[k]||0,v)}if(/Squat|Lunge|Step/.test(n)){addMuscle('quads',3);addMuscle('glutes',3);addMuscle('trunk',2)}if(/RDL|Deadlift|Hinge/.test(n)){addMuscle('hamstrings',4);addMuscle('glutes',4);addMuscle('trunk',3)}if(/Bridge/.test(n)){addMuscle('glutes',2);addMuscle('hamstrings',1);addMuscle('trunk',1)}if(/Pogo|Jump|Hop|Shuttle|Fast Feet|Sprint/.test(n)){addMuscle('calves',3);addMuscle('quads',2);addMuscle('glutes',2);addMuscle('trunk',1)}if(/Push|Press|Slam/.test(n)){addMuscle('chest',2);addMuscle('shoulders',3);addMuscle('arms',2);addMuscle('trunk',2)}if(/Row|Pullup|Hang/.test(n)){addMuscle('back',3);addMuscle('arms',2);addMuscle('shoulders',1)}if(/Carry|Plank|Dead Bug|Brace|Breathing/.test(n)){addMuscle('trunk',3)}if(/Hip|Mobility|Stretch|Balance/.test(n)){addMuscle('hips',1);addMuscle('trunk',1)}return out}
function fatigueFor(b){var n=b.baseName||b.n,out={};function addFatigue(k,v){out[k]=Math.max(out[k]||0,v)}if(/Barbell Squat|Goblet Squat/.test(n)){addFatigue('systemic',3);addFatigue('spineBrace',3);addFatigue('local',3);addFatigue('joint',1)}if(/Barbell RDL|Dumbbell RDL|Deadlift/.test(n)){addFatigue('systemic',4);addFatigue('posterior',4);addFatigue('spineBrace',4);addFatigue('local',3);addFatigue('grip',2)}if(/Pogo|Jump|Hop|Shuttle|Fast Feet|Sprint|Box/.test(n)){addFatigue('neural',3);addFatigue('impact',3);addFatigue('joint',2)}if(/Med Ball Slam/.test(n)){addFatigue('neural',3);addFatigue('systemic',2);addFatigue('spineBrace',2)}if(/Farmer Carry/.test(n)){addFatigue('systemic',2);addFatigue('spineBrace',3);addFatigue('grip',4);addFatigue('local',2)}if(/Push|Press|Row|Pullup/.test(n)){addFatigue('local',2);addFatigue('joint',1)}if(/Burpee|Conditioning|Jump Rope/.test(n)){addFatigue('systemic',3);addFatigue('local',2)}if(/Dead Bug|Plank|Breathing/.test(n)){addFatigue('spineBrace',1);addFatigue('local',1)}if(/Mobility|Stretch/.test(n)){addFatigue('recovery',1)}return out}

function setupCue(b){var n=(b&&(b.baseName||b.n)||'').toLowerCase(), w=b&&b.w?b.w:'Open floor';
  if(/pogo|line hop|jump|landing|fast feet/.test(n))return 'Clear the floor, stand tall, and use soft athletic posture.';
  if(/squat|lunge|step/.test(n))return 'Set feet stable, brace lightly, and keep knees tracking over toes.';
  if(/row|pull|band/.test(n))return 'Anchor or hold the resistance securely and keep ribs stacked over hips.';
  if(/push|press/.test(n))return 'Set hands/weights first, brace, and keep shoulders controlled.';
  if(/dead bug|plank|side plank|core/.test(n))return 'Start slow, ribs down, breathe through the brace, and control the trunk.';
  if(/stretch|mobility|breathing|flow|hip|ankle|spine|shoulder/.test(n))return 'Move into the position gradually and stay below pain or pinching.';
  return 'Set up with '+w+' and start only when the space is clear.';
}
function coachingCue(b){var method=(b&&b.method)||'', intent=(b&&b.intent)||'', why=(b&&b.why)||'';
  if(/Power|Complex/i.test(method)||/power|speed/.test(intent))return 'Explode, reset fully, and stop the block if speed or landing quality drops.';
  if(/Strength/i.test(method)||intent==='strength')return 'Control the lowering phase, brace, then drive strongly without grinding sloppy reps.';
  if(/Hypertrophy|Pump/i.test(method)||/hypertrophy|muscle/.test(intent))return 'Keep tension on the target muscle. Slow down before form breaks.';
  if(/Circuit|Interval|Tempo/i.test(method)||/conditioning|cardio|endurance/.test(intent))return 'Keep a repeatable pace. Finish the round clean, not reckless.';
  if(/Flow|Movement/i.test(method)||/mobility|recovery|core/.test(intent))return 'Use calm breathing, clean range, and posture control.';
  return why||'Move with control and follow the timer.';
}
function safetyCue(b){var intent=(b&&b.intent)||'', method=(b&&b.method)||'', n=(b&&(b.baseName||b.n)||'').toLowerCase();
  if(/jump|hop|plyo|landing|speed|power/.test(intent+' '+method+' '+n))return 'No pain, no heavy landings. Reduce height or switch to movement if joints feel sharp.';
  if(/strength|hypertrophy/.test(intent+' '+method))return 'Leave clean reps in reserve. Do not chase failure on technical work.';
  if(/conditioning|cardio|endurance/.test(intent+' '+method))return 'Back off if breathing becomes panicked or form collapses.';
  return 'Stay in comfortable range. Stop if pain changes the movement.';
}
